name: Build React SPA Radio Client

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Removes old Android files to keep your repository clean
    - name: Clean Old Android Project Structure
      run: |
        rm -rf app gradle .gradle gradlew gradlew.bat build.gradle settings.gradle
        echo "Cleaned old Android files."

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Overwrites package.json adding React, Socket.io, Tailwind, and Capacitor libraries
    - name: Force Overwrite package.json
      shell: python
      run: |
        import os
        with open("package.json", "w") as f:
            f.write("""{
          "name": "herbdout-radio-listener",
          "private": true,
          "version": "1.0.0",
          "type": "module",
          "scripts": {
            "dev": "vite",
            "build": "vite build",
            "preview": "vite preview"
          },
          "dependencies": {
            "react": "^18.2.0",
            "react-dom": "^18.2.0",
            "socket.io-client": "^4.7.4",
            "lucide-react": "^0.344.0",
            "@capacitor/core": "^5.7.0"
          },
          "devDependencies": {
            "@types/react": "^18.2.56",
            "@types/react-dom": "^18.2.19",
            "@vitejs/plugin-react": "^4.2.1",
            "autoprefixer": "^10.4.17",
            "postcss": "^8.4.35",
            "tailwindcss": "^3.4.1",
            "typescript": "^5.2.2",
            "vite": "^5.1.4",
            "@capacitor/cli": "^5.7.0",
            "@capacitor/android": "^5.7.0"
          }
        }""")

    # Configures Vite bundler parameters
    - name: Force Overwrite vite.config.ts
      shell: python
      run: |
        with open("vite.config.ts", "w") as f:
            f.write("""import { defineConfig } from 'vite'
        import react from '@vitejs/plugin-react'

        export default defineConfig({
          plugins: [react()],
          server: {
            port: 3000
          }
        })""")

    # Configures PostCSS properties
    - name: Force Overwrite postcss.config.js
      shell: python
      run: |
        with open("postcss.config.js", "w") as f:
            f.write("""export default {
          plugins: {
            tailwindcss: {},
            autoprefixer: {},
          },
        }""")

    # Configures Tailwind CSS content scan boundaries
    - name: Force Overwrite tailwind.config.js
      shell: python
      run: |
        with open("tailwind.config.js", "w") as f:
            f.write("""/** @type {import('tailwindcss').Config} */
        export default {
          content: [
            "./index.html",
            "./src/**/*.{js,ts,jsx,tsx}",
          ],
          theme: {
            extend: {
              colors: {
                neonGreen: "#5EFF00",
                oledBlack: "#050505",
                panelDark: "#0B0C0B"
              }
            },
          },
          plugins: [],
        }""")
        # Configures index.html mount point
    - name: Force Overwrite index.html
      shell: python
      run: |
        with open("index.html", "w") as f:
            f.write("""<!doctype html>
        <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <link rel="icon" type="image/svg+xml" href="https://ais-dev-eov36f74tvwrwzzr5kg2pz-787301755010.europe-west2.run.app/favicon.ico" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Herbdout Radio - Live Listener Station</title>
          </head>
          <body class="bg-[#050505] text-white">
            <div id="root"></div>
            <script type="module" src="/src/main.tsx"></script>
          </body>
        </html>""")

    # Setup the React source directory files
    - name: Create React Source Directory Files
      shell: python
      run: |
        import os
        os.makedirs("src", exist_ok=True)
        
        # main.tsx mount loader file
        with open("src/main.tsx", "w") as f:
            f.write("""import React from 'react'
        import ReactDOM from 'react-dom/client'
        import App from './App.tsx'
        import './index.css'

        ReactDOM.createRoot(document.getElementById('root')!).render(
          <React.StrictMode>
            <App />
          </React.StrictMode>,
        )""")

        # index.css with core Tailwind loads and the GPU-accelerated floating emoji keyframe animation
        with open("src/index.css", "w") as f:
            f.write("""@tailwind base;
        @tailwind components;
        @tailwind utilities;

        /* Custom Floating Emoji Animations */
        @keyframes floatUpReact {
          0% {
            transform: translateY(105vh) scale(0.6);
            opacity: 0;
          }
          15% {
            opacity: 1;
            transform: translateY(70vh) scale(1.3);
          }
          100% {
            transform: translateY(-5vh) scale(1.0);
            opacity: 0;
          }
        }

        .floating-emoji {
          position: absolute;
          bottom: -60px;
          font-size: 3.5rem;
          animation: floatUpReact 3.2s cubic-bezier(0.25, 1, 0.50, 1) forwards;
          pointer-events: none;
          z-index: 50;
        }""")

    # Overwrites App.tsx with the first half of the React/Socket/Scraper codebase
    - name: Force Overwrite src/App.tsx (Part 1 of 2)
      shell: python
      run: |
        import os
        os.makedirs("src", exist_ok=True)
        with open("src/App.tsx", "w") as f:
            f.write("""import React, { useState, useEffect, useRef } from "react";
        import { io, Socket } from "socket.io-client";
        import {
          Play,
          Pause,
          Volume2,
          VolumeX,
          Users,
          Radio,
          MessageSquare,
          Send,
          Music,
          HelpCircle,
          User,
          Activity,
          Settings,
          X
        } from "lucide-react";

        // --- CONFIGURATION ---
        const BACKEND_URL = "https://ais-dev-eov36f74tvwrwzzr5kg2pz-787301755010.europe-west2.run.app";

        // Interfaces
        interface NowPlaying {
          title: string;
          artist: string;
          album: string;
        }

        interface StatusData {
          listeners: number;
          nowPlaying: NowPlaying;
          isBroadcasting: boolean;
        }

        interface ChatMessage {
          id: string;
          user: string;
          text: string;
          timestamp: number;
        }

        interface FloatingEmoji {
          id: string;
          emoji: string;
          x: number; // 0.0 to 1.0 (relative screen width)
        }

        export default function App() {
          const [isPlaying, setIsPlaying] = useState(false);
          const [isBuffering, setIsBuffering] = useState(false);
          const [volume, setVolume] = useState(0.8);
          const [isMuted, setIsMuted] = useState(false);
          const [prevVolume, setPrevVolume] = useState(0.8);

          // Dynamic Stream URL State
          const [streamUrl, setStreamUrl] = useState("http://uk18freenew.listen2myradio.com:5784/stream");

          // Real-Time States
          const [status, setStatus] = useState<StatusData>({
            listeners: 0,
            nowPlaying: { title: "Offline", artist: "Herbdout Radio", album: "None" },
            isBroadcasting: false
          });
          const [chatMessages, setChatMessages] = useState<ChatMessage[]>([]);
          const [chatInput, setChatInput] = useState("");
          
          // Load username from localStorage, default to 'Listener'
          const [username, setUsername] = useState<string>(() => {
            if (typeof window !== "undefined") {
              return localStorage.getItem("herbdout_username") || "Listener";
            }
            return "Listener";
          });
          
          const [tempUsername, setTempUsername] = useState(username);

          // Visual/Animation/Drawer States
          const [floatingEmojis, setFloatingEmojis] = useState<FloatingEmoji[]>([]);
          const [isChatSidebarOpen, setIsChatSidebarOpen] = useState(true);
          const [isSettingsOpen, setIsSettingsOpen] = useState(false);

          // Refs
          const audioRef = useRef<HTMLAudioElement | null>(null);
          const socketRef = useRef<Socket | null>(null);
          const chatEndRef = useRef<HTMLDivElement | null>(null);

          // Resolve the stream URL dynamically from herbdout.radio12345.com on launch
          useEffect(() => {
            const resolveStreamUrl = async () => {
              try {
                const response = await fetch("https://herbdout.radio12345.com/");
                if (response.ok) {
                  const html = await response.text();
                  const match = html.match(/https?:\/\/[a-zA-Z0-9.-]+:[0-9]+\/[a-zA-Z0-9_.-]+/);
                  if (match) {
                    console.log("Resolved dynamic stream URL:", match[0]);
                    setStreamUrl(match[0]);
                  }
                }
              } catch (e) {
                console.error("CORS or network error. Using fallback stream link.", e);
              }
            };
            resolveStreamUrl();
          }, []);

          // 1. Initialize Socket.IO Client & Listeners
          useEffect(() => {
            const socket: Socket = io(BACKEND_URL, {
              transports: ["websocket"]
            });
            socketRef.current = socket;

            // Listen for broadcast metadata status
            socket.on("status", (data: StatusData) => {
              setStatus(data);
            });

            // Listen for 50 most recent messages on first load
            socket.on("chat-history", (historyArray: any[]) => {
              const mapped = historyArray.map((msg, idx) => ({
                id: msg.id || `history-${idx}`,
                user: msg.user || "Anonymous",
                text: msg.text || "",
                timestamp: msg.timestamp || Date.now()
              }));
              setChatMessages(mapped);
            });

            // Listen for incoming real-time chat messages
            socket.on("chat-message", (msg: any) => {
              const newMsg: ChatMessage = {
                id: msg.id || Math.random().toString(),
                user: msg.user || "Anonymous",
                text: msg.text || "",
                timestamp: msg.timestamp || Date.now()
              };
              setChatMessages((prev) => [...prev, newMsg].slice(-100)); // Keep last 100 messages locally
            });

            // Listen for real-time emoji emissions
            socket.on("new-emoji", (payload: { emoji: string; x: number }) => {
              const newEmoji: FloatingEmoji = {
                id: Math.random().toString(),
                emoji: payload.emoji,
                x: payload.x || Math.random()
              };
              setFloatingEmojis((prev) => [...prev, newEmoji]);

              // Automatically clean up nodes after 3 seconds to preserve browser memory
              setTimeout(() => {
                setFloatingEmojis((prev) => prev.filter((e) => e.id !== newEmoji.id));
              }, 3000);
            });

            return () => {
              socket.disconnect();
            };
          }, []);
        """)
# Appends the second half of the React/Socket codebase to App.tsx
    - name: Force Overwrite src/App.tsx (Part 2 of 2)
      shell: python
      run: |
        with open("src/App.tsx", "a") as f:
            f.write("""
          // Auto-scroll chat panel to bottom when new messages arrive
          useEffect(() => {
            chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
          }, [chatMessages]);

          // Handle Play/Pause with buffer clearing on restart to keep the live boundary fresh
          const togglePlay = () => {
            if (!audioRef.current) return;

            if (isPlaying) {
              audioRef.current.pause();
              setIsPlaying(false);
              setIsBuffering(false);
            } else {
              setIsBuffering(true);
              // Reconnect fresh to the resolved dynamic stream URL state (Fixes stalled play issue)
              audioRef.current.src = streamUrl;
              audioRef.current.load();
              audioRef.current.play()
                .then(() => {
                  setIsPlaying(true);
                  setIsBuffering(false);
                })
                .catch((e) => {
                  console.error("Playback stalled or blocked", e);
                  setIsPlaying(false);
                  setIsBuffering(false);
                });
            }
          };

          const handleVolumeChange = (e: React.ChangeEvent<HTMLInputElement>) => {
            const val = parseFloat(e.target.value);
            setVolume(val);
            if (audioRef.current) {
              audioRef.current.volume = val;
            }
            if (val > 0) {
              setIsMuted(false);
            }
          };

          const toggleMute = () => {
            if (isMuted) {
              setVolume(prevVolume);
              setIsMuted(false);
              if (audioRef.current) {
                audioRef.current.volume = prevVolume;
              }
            } else {
              setPrevVolume(volume);
              setVolume(0);
              setIsMuted(true);
              if (audioRef.current) {
                audioRef.current.volume = 0;
              }
            }
          };

          const handleSendChat = (e: React.FormEvent) => {
            e.preventDefault();
            if (!socketRef.current || !chatInput.trim()) return;

            socketRef.current.emit("send-chat", {
              user: username,
              text: chatInput
            });
            setChatInput("");
          };

          const handleSendEmoji = (emojiChar: string) => {
            if (!socketRef.current) return;

            socketRef.current.emit("send-emoji", {
              emoji: emojiChar,
              x: Math.random() // Randomized horizontal floating point
            });
          };

          const saveUsername = () => {
            if (tempUsername.trim()) {
              setUsername(tempUsername);
              localStorage.setItem("herbdout_username", tempUsername);
              setIsSettingsOpen(false);
            }
          };

          return (
            <div className="min-h-screen bg-[#050505] text-white flex flex-col md:flex-row relative overflow-hidden">
              
              {/* Hidden Native Audio Element */}
              <audio
                ref={audioRef}
                onWaiting={() => setIsBuffering(true)}
                onPlaying={() => setIsBuffering(false)}
                onError={() => {
                  setIsPlaying(false);
                  setIsBuffering(false);
                }}
              />

              {/* Main Player Screen Area */}
              <div className="flex-1 flex flex-col justify-between p-6 relative z-10">
                {/* Top Header */}
                <header className="flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <Radio className="w-8 h-8 text-[#5EFF00]" />
                    <h1 className="text-xl font-extrabold tracking-wider italic">
                      HERBDOUT<span className="text-[#5EFF00]">RADIO</span>
                    </h1>
                  </div>

                  <div className="flex items-center gap-4">
                    {/* Status Badge */}
                    <div className="flex items-center gap-2 bg-[#0b0c0b] px-3 py-1.5 rounded-full border border-neutral-800">
                      <span className={`w-2.5 h-2.5 rounded-full ${status.isBroadcasting ? "bg-[#5EFF00] animate-pulse" : "bg-neutral-600"}`} />
                      <span className="text-xs font-bold uppercase tracking-wider">
                        {status.isBroadcasting ? "LIVE" : "OFF AIR"}
                      </span>
                    </div>

                    {/* Active listeners */}
                    <div className="flex items-center gap-2 bg-[#0b0c0b] px-3 py-1.5 rounded-full border border-neutral-800 text-neutral-400">
                      <Users className="w-4 h-4 text-[#5EFF00]" />
                      <span className="text-xs font-bold">{status.listeners}</span>
                    </div>

                    {/* Left settings drawer toggle */}
                    <button
                      onClick={() => setIsSettingsOpen(!isSettingsOpen)}
                      className="p-2 bg-[#0b0c0b] rounded-full border border-neutral-800 hover:border-[#5EFF00] transition"
                    >
                      <Settings className="w-5 h-5" />
                    </button>

                    {/* Toggle Chat button for Mobile */}
                    <button
                      onClick={() => setIsChatSidebarOpen(!isChatSidebarOpen)}
                      className="md:hidden p-2 bg-[#0b0c0b] rounded-full border border-neutral-800 hover:border-[#5EFF00] transition"
                    >
                      <MessageSquare className="w-5 h-5" />
                    </button>
                  </div>
                </header>

                {/* Concentric Rotating Vinyl Card */}
                <div className="flex-1 flex flex-col justify-center items-center py-8 relative">
                  <div className="relative w-72 h-72 md:w-80 md:h-80 rounded-full flex items-center justify-center bg-[#0d0d0d] border border-neutral-900 shadow-2xl">
                    
                    {/* Outer Grooved Ring */}
                    <div className={`absolute inset-4 rounded-full border border-[#5EFF00]/20 flex items-center justify-center ${isPlaying && !isBuffering ? "animate-spin" : ""}`} style={{ animationDuration: "12s" }}>
                      
                      {/* Mid Ring */}
                      <div className="absolute inset-8 rounded-full border border-neutral-800 flex items-center justify-center">
                        {/* Inner Ring */}
                        <div className="absolute inset-8 rounded-full border border-neutral-700 flex items-center justify-center">
                          {/* Central Label */}
                          <div className="absolute inset-10 rounded-full bg-[#121212] border-2 border-[#5EFF00] flex items-center justify-center">
                            <Radio className="w-10 h-10 text-[#5EFF00]" />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Metadata and track status details */}
                  <div className="text-center mt-8 max-w-md px-4">
                    <h2 className="text-2xl font-bold tracking-tight text-white line-clamp-1">
                      {status.nowPlaying.title}
                    </h2>
                    <p className="text-[#5EFF00] text-sm font-semibold tracking-wide uppercase mt-2">
                      {status.nowPlaying.artist}
                    </p>
                    <p className="text-neutral-500 text-xs mt-1 italic">
                      {status.nowPlaying.album !== "None" ? `Album: ${status.nowPlaying.album}` : ""}
                    </p>
                  </div>
                </div>

                {/* Player Controls Bar */}
                <div className="flex flex-col items-center gap-6 max-w-lg mx-auto w-full">
                  
                  {/* Emoji quick reaction bar */}
                  <div className="flex justify-center gap-3 bg-[#0b0c0b] p-2 rounded-full border border-neutral-900 w-full max-w-sm">
                    {["❤️", "🔥", "👍", "🎵", "👑"].map((emoji) => (
                      <button
                        key={emoji}
                        onClick={() => handleSendEmoji(emoji)}
                        className="text-2xl p-2 hover:scale-125 hover:rotate-12 transition-transform duration-100"
                      >
                        {emoji}
                      </button>
                    ))}
                  </div>

                  {/* Control elements */}
                  <div className="flex items-center justify-between bg-[#0b0c0b] px-6 py-4 rounded-3xl border border-neutral-900 w-full">
                    
                    {/* Play Button */}
                    <button
                      onClick={togglePlay}
                      className="w-14 h-14 rounded-full bg-[#5EFF00] text-black flex items-center justify-center hover:scale-105 active:scale-95 transition shadow-lg shadow-[#5EFF00]/20"
                    >
                      {isBuffering ? (
                        <div className="w-6 h-6 border-3 border-black border-t-transparent rounded-full animate-spin" />
                      ) : isPlaying ? (
                        <Pause className="w-6 h-6 fill-black" />
                      ) : (
                        <Play className="w-6 h-6 fill-black translate-x-0.5" />
                      )}
                    </button>

                    <div className="text-center">
                      <span className="text-xs text-neutral-500 font-bold tracking-wider uppercase">
                        {isBuffering ? "Buffering..." : isPlaying ? "Streaming Live" : "Paused"}
                      </span>
                    </div>

                    {/* Mute and volume slider controls */}
                    <div className="flex items-center gap-3">
                      <button
                        onClick={toggleMute}
                        className="p-2 text-neutral-400 hover:text-white transition"
                      >
                        {isMuted || volume === 0 ? <VolumeX className="w-5 h-5" /> : <Volume2 className="w-5 h-5" />}
                      </button>
                      <input
                        type="range"
                        min="0"
                        max="1"
                        step="0.05"
                        value={volume}
                        onChange={handleVolumeChange}
                        className="w-20 md:w-24 h-1 bg-neutral-800 rounded-lg appearance-none cursor-pointer accent-[#5EFF00]"
                      />
                    </div>

                  </div>
                </div>
              </div>

              {/* Slide-out Settings Sidebar Panel (Left) */}
              <div
                className={`fixed top-0 left-0 h-full w-full md:w-80 bg-[#0b0c0b] border-r border-neutral-900 flex flex-col transition-transform duration-300 z-50 ${isSettingsOpen ? "translate-x-0" : "-translate-x-full"}`}
              >
                <div className="p-4 border-b border-neutral-900 flex justify-between items-center">
                  <div className="flex items-center gap-2 text-neutral-300">
                    <Settings className="w-5 h-5 text-[#5EFF00]" />
                    <span className="font-bold tracking-wide">Settings Console</span>
                  </div>
                  <button onClick={() => setIsSettingsOpen(false)} className="text-neutral-500 hover:text-white">
                    <X className="w-5 h-5" />
                  </button>
                </div>

                <div className="p-6 flex flex-col gap-6">
                  <div>
                    <label className="block text-xs font-bold text-neutral-500 uppercase tracking-wider mb-2">
                      User Profile Nickname
                    </label>
                    <div className="flex gap-2">
                      <input
                        type="text"
                        maxLength={15}
                        className="flex-1 bg-[#121212] border border-neutral-800 rounded-full px-4 py-2 text-sm outline-none text-white focus:border-[#5EFF00] transition"
                        value={tempUsername}
                        onChange={(e) => setTempUsername(e.target.value)}
                      />
                      <button
                        onClick={saveUsername}
                        className="bg-[#5EFF00] text-black text-xs font-bold rounded-full px-4 py-2 hover:scale-105 transition"
                      >
                        Save
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              {/* Slide-out Live Chat Sidebar Panel (Right) */}
              <div
                className={`fixed md:relative top-0 right-0 h-full w-full md:w-96 bg-[#0b0c0b] border-l border-neutral-900 flex flex-col transition-transform duration-300 z-50 ${isChatSidebarOpen ? "translate-x-0" : "translate-x-full md:translate-x-0 md:hidden"}`}
              >
                {/* Chat Panel Header */}
                <div className="p-4 border-b border-neutral-900 flex justify-between items-center">
                  <div className="flex items-center gap-2 text-neutral-300">
                    <MessageSquare className="w-5 h-5 text-[#5EFF00]" />
                    <span className="font-bold tracking-wide">Live Chat Room</span>
                  </div>
                  
                  {/* Close button for Mobile drawers */}
                  <button
                    onClick={() => setIsChatSidebarOpen(false)}
                    className="md:hidden text-neutral-500 hover:text-white"
                  >
                    ✕
                  </button>
                </div>

                {/* Scrolling message logs */}
                <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                  {chatMessages.map((msg) => (
                    <div key={msg.id} className="bg-[#121212]/50 border border-neutral-900/50 rounded-2xl p-3">
                      <div className="flex items-baseline gap-2 mb-1">
                        <span className="text-xs font-extrabold text-[#5EFF00]">{msg.user}</span>
                        <span className="text-[10px] text-neutral-600">
                          {new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </span>
                      </div>
                      <p className="text-sm text-neutral-300 break-words">{msg.text}</p>
                    </div>
                  ))}
                  <div ref={chatEndRef} />
                </div>

                {/* Input action footer */}
                <form onSubmit={handleSendChat} className="p-4 border-t border-neutral-900 flex gap-2">
                  <input
                    type="text"
                    maxLength={150}
                    placeholder="Say something live..."
                    value={chatInput}
                    onChange={(e) => setChatInput(e.target.value)}
                    className="flex-1 bg-[#121212] border border-neutral-800 rounded-full px-4 py-2.5 text-sm outline-none text-white focus:border-[#5EFF00] transition"
                  />
                  <button
                    type="submit"
                    className="w-10 h-10 rounded-full bg-[#5EFF00] text-black flex items-center justify-center hover:scale-105 transition active:scale-95 shrink-0"
                  >
                    <Send className="w-4 h-4" />
                  </button>
                </form>
              </div>

              {/* Floating Emoji Canvas */}
              <div className="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-40">
                {floatingEmojis.map((item) => (
                  <span
                    key={item.id}
                    className="floating-emoji"
                    style={{
                      left: `${item.x * 100}%`
                    }}
                  >
                    {item.emoji}
                  </span>
                ))}
              </div>

            </div>
          );
        }
        """)

    # Installs NPM modules and compiles web assets into /dist
    - name: NPM Install and Web SPA Build
      run: |
        npm install
        npm run build
        # Initializes Capacitor, configures Android platforms, and syncs web files
    - name: Package React SPA into Android Container (Capacitor)
      run: |
        npx cap init "Herbdout Radio" "com.example.herbdoutradio" --web-dir=dist
        npx cap add android

    # Injects standard http scheme configuration directly into the Capacitor native config (Bypasses WebView Mixed Content blocks)
    - name: Configure Capacitor Android Scheme
      shell: python
      run: |
        import os, json
        # Configure JSON if it exists
        if os.path.exists("capacitor.config.json"):
            with open("capacitor.config.json", "r") as f:
                data = json.load(f)
            if "server" not in data:
                data["server"] = {}
            data["server"]["androidScheme"] = "http"
            with open("capacitor.config.json", "w") as f:
                json.dump(data, f, indent=2)
        # Configure TS if it exists
        if os.path.exists("capacitor.config.ts"):
            with open("capacitor.config.ts", "r") as f:
                content = f.read()
            if "androidScheme" in content:
                content = content.replace("'https'", "'http'").replace('"https"', '"http"')
            else:
                if "server:" in content:
                    content = content.replace("server: {", "server: {\\n    androidScheme: 'http',")
                else:
                    content = content.replace("const config: CapacitorConfig = {", "const config: CapacitorConfig = {\\n  server: {\\n    androidScheme: 'http'\\n  },")
            with open("capacitor.config.ts", "w") as f:
                f.write(content)
        print("Enforced HTTP scheme in Capacitor config.")

    # Synchronizes modified config and Web files to the native Android directory
    - name: Sync Capacitor Android Project
      run: |
        npx cap sync android

    # Injects usesCleartextTraffic="true" and POST_NOTIFICATIONS permissions directly into Capacitor's AndroidManifest
    - name: Inject Cleartext Permissions into Capacitor AndroidManifest
      shell: python
      run: |
        import os
        manifest_path = "android/app/src/main/AndroidManifest.xml"
        if os.path.exists(manifest_path):
            with open(manifest_path, "r") as f:
                content = f.read()
            
            # Enforce usesCleartextTraffic="true" to allow play of non-SSL http:// audio streams
            if 'android:usesCleartextTraffic="true"' not in content:
                content = content.replace("<application", '<application android:usesCleartextTraffic="true"')
            
            # Add POST_NOTIFICATIONS permission
            if 'android.permission.POST_NOTIFICATIONS' not in content:
                content = content.replace("</manifest>", '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\\n</manifest>')
                
            with open(manifest_path, "w") as f:
                f.write(content)
            print("Successfully updated AndroidManifest.xml with cleartext and notification permissions.")

    # Injects app renaming variables natively into Capacitor's strings.xml
    - name: Inject App Name into Capacitor strings.xml
      shell: python
      run: |
        import os
        strings_path = "android/app/src/main/res/values/strings.xml"
        if os.path.exists(strings_path):
            with open(strings_path, "w") as f:
                f.write("""<?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Herbdout Radio</string>
            <string name="title_activity_main">Herbdout Radio</string>
            <string name="package_name">com.example.herbdoutradio</string>
        </resources>""")
            print("Successfully renamed app in strings.xml")

    # Injects the custom green star launcher icon assets natively into Capacitor's resource folders
    - name: Inject Custom Star Launcher Drawables & Adaptive Icons
      shell: python
      run: |
        import os
        os.makedirs("android/app/src/main/res/drawable", exist_ok=True)
        os.makedirs("android/app/src/main/res/values", exist_ok=True)
        os.makedirs("android/app/src/main/res/mipmap-anydpi-v26", exist_ok=True)
        
        # colors.xml launcher background color
        with open("android/app/src/main/res/values/colors.xml", "w") as f:
            f.write("""<?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="ic_launcher_background">#080808</color>
        </resources>""")
            
        # Star logo vector
        with open("android/app/src/main/res/drawable/ic_star_logo.xml", "w") as f:
            f.write("""<vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="24dp"
            android:height="24dp"
            android:viewportWidth="24"
            android:viewportHeight="24">
            <path
                android:fillColor="#5EFF00"
                android:pathData="M12,0 L14.8,7.2 L22.1,4.5 L16.8,10.2 L24,12 L16.8,13.8 L22.1,19.5 L14.8,16.8 L12,24 L9.2,16.8 L1.9,19.5 L7.2,13.8 L0,12 L7.2,10.2 L1.9,4.5 L9.2,7.2 Z" />
        </vector>""")
            
        # Star logo launcher vector (scaled)
        with open("android/app/src/main/res/drawable/ic_star_logo_launcher.xml", "w") as f:
            f.write("""<vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <group
                android:translateX="30"
                android:translateY="30"
                android:scaleX="2"
                android:scaleY="2">
                <path
                    android:fillColor="#5EFF00"
                    android:pathData="M12,0 L14.8,7.2 L22.1,4.5 L16.8,10.2 L24,12 L16.8,13.8 L22.1,19.5 L14.8,16.8 L12,24 L9.2,16.8 L1.9,19.5 L7.2,13.8 L0,12 L7.2,10.2 L1.9,4.5 L9.2,7.2 Z" />
            </group>
        </vector>""")
            
        # Adaptive launcher icons
        adaptive_icon = """<?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_star_logo_launcher"/>
        </adaptive-icon>"""
        
        with open("android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml", "w") as f:
            f.write(adaptive_icon)
        with open("android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml", "w") as f:
            f.write(adaptive_icon)
            
        print("Successfully injected all launcher drawables and icons natively.")

    # Compiles the Android project with the embedded web container and custom native manifest settings into an .apk file
    - name: Compile Android APK with Gradle
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace

    # Locates your completed .apk file inside the workspace
    - name: Locate APK Files
      run: |
        echo "Listing any generated APK files in the project path:"
        find . -name "*.apk"

    # Uploads the final installable native .apk file to your Actions tab
    - name: Upload Native APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

