import React, { useState, useEffect, useRef } from "react";
import { io, Socket } from "socket.io-client";
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged, User } from "firebase/auth";

// --- CONFIGURATION ---
// Explicitly point to the central Hub URL
const HUB_URL = "https://ais-pre-eov36f74tvwrwzzr5kg2pz-787301755010.europe-west2.run.app";

// Your Firebase configuration object (replace with your actual config keys)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Types
interface ChatMessage {
  id?: string;
  sender: string;
  avatar: string;
  text: string;
  timestamp?: number;
}

interface FloatingEmoji {
  id: string;
  character: string;
  leftOffset: number;
}

export default function App() {
  const [user, setUser] = useState<User | null>(null);
  const [socket, setSocket] = useState<Socket | null>(null);
  
  // Chat States
  const [chatMessages, setChatMessages] = useState<ChatMessage[]>([]);
  const [chatInput, setChatInput] = useState("");
  const [showChat, setShowChat] = useState(false);
  
  // Emoji States
  const [floatingEmojis, setFloatingEmojis] = useState<FloatingEmoji[]>([]);
  
  const chatEndRef = useRef<HTMLDivElement>(null);

  // 1. Monitor Firebase Authentication State
  useEffect(() => {
    const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
      setUser(currentUser);
    });
    return () => unsubscribe();
  }, []);

  // 2. Setup Socket.io connection & Event Subscriptions
  useEffect(() => {
    // Force standard WebSocket transport to bypass Cloud Run long-polling proxies
    const socketInstance = io(HUB_URL, {
      transports: ["websocket"]
    });

    setSocket(socketInstance);

    // Subscribe to chat history
    socketInstance.on("chat-history", (msgs: ChatMessage[]) => {
      setChatMessages(msgs);
    });

    // Subscribe to new real-time chat messages
    socketInstance.on("chat-message", (msg: ChatMessage) => {
      setChatMessages((prev) => [...prev, msg].slice(-100)); // Cap local state at last 100 messages
    });

    // Subscribe to incoming emoji reactions
    socketInstance.on("new-emoji", (data: { emoji: string; sender: string; avatar: string }) => {
      const newEmoji: FloatingEmoji = {
        id: Math.random().toString(),
        character: data.emoji,
        leftOffset: Math.floor(Math.random() * 60) + 20 // Random position between 20% and 80% width
      };

      setFloatingEmojis((prev) => [...prev, newEmoji]);

      // Automatically clean up emoji views after 2 seconds to avoid memory bloat
      setTimeout(() => {
        setFloatingEmojis((prev) => prev.filter((e) => e.id !== newEmoji.id));
      }, 2000);
    });

    return () => {
      socketInstance.disconnect();
    };
  }, []);

  // Auto-scroll chat panel to bottom when new messages arrive
  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [chatMessages]);

  // 3. Emit real-time chat messages
  const sendChatMessage = (e: React.FormEvent) => {
    e.preventDefault();
    if (!socket || !chatInput.trim()) return;

    const payload = {
      sender: user?.displayName || "Anonymous Broadcaster",
      avatar: user?.photoURL || "",
      text: chatInput
    };

    socket.emit("send-chat", payload);
    setChatInput("");
  };

  // 4. Emit real-time emoji reactions
  const sendEmojiReaction = (emojiCharacter: string) => {
    if (!socket) return;

    const payload = {
      sender: user?.displayName || "Anonymous Broadcaster",
      avatar: user?.photoURL || "",
      emoji: emojiCharacter
    };

    socket.emit("send-emoji", payload);
  };

  return (
    <div style={styles.appContainer}>
      {/* Header Bar */}
      <header style={styles.header}>
        <div style={styles.logoGroup}>
          <div style={styles.starLogo}>★</div>
          <h1 style={styles.title}>HERBDOUT<span style={styles.titleGreen}>RADIO</span></h1>
        </div>
        <button style={styles.btnToggleChat} onClick={() => setShowChat(!showChat)}>
          {showChat ? "Hide Chat" : "Show Chat"}
        </button>
      </header>

      {/* Main Broadcaster Screen Placeholder */}
      <main style={styles.mainContent}>
        <div style={styles.broadcastCard}>
          <div style={styles.liveBadge}>● LIVE</div>
          <p style={styles.cardText}>Broadcaster Dashboard Console</p>
        </div>

        {/* Floating Emoji Animation Canvas */}
        <div style={styles.emojiCanvas}>
          {floatingEmojis.map((emoji) => (
            <span
              key={emoji.id}
              style={{
                ...styles.floatingEmoji,
                left: `${emoji.leftOffset}%`
              }}
            >
              {emoji.character}
            </span>
          ))}
        </div>
      </main>

      {/* Slide-out Chat Panel */}
      <div style={{ ...styles.chatPanel, transform: showChat ? "translateX(0)" : "translateX(100%)" }}>
        <div style={styles.chatHeader}>
          <h3>Live Chat Room</h3>
          <button style={styles.btnCloseChat} onClick={() => setShowChat(false)}>✕</button>
        </div>

        <div style={styles.messageList}>
          {chatMessages.map((msg, index) => (
            <div key={index} style={styles.msgBubble}>
              <div style={styles.msgMeta}>
                {msg.avatar ? (
                  <img src={msg.avatar} alt="avatar" style={styles.msgAvatar} />
                ) : (
                  <div style={styles.msgAvatarPlaceholder}>👤</div>
                )}
                <span style={styles.msgSender}>{msg.sender}</span>
              </div>
              <p style={styles.msgText}>{msg.text}</p>
            </div>
          ))}
          <div ref={chatEndRef} />
        </div>

        <form onSubmit={sendChatMessage} style={styles.chatForm}>
          <input
            type="text"
            placeholder="Type a message..."
            value={chatInput}
            onChange={(e) => setChatInput(e.target.value)}
            style={styles.chatInput}
          />
          <button type="submit" style={styles.btnSend}>Send</button>
        </form>
      </div>

      {/* Bottom Tray for Emoji Reactions */}
      <footer style={styles.emojiTray}>
        <button onClick={() => sendEmojiReaction("❤️")} style={styles.emojiButton}>❤️</button>
        <button onClick={() => sendEmojiReaction("🔥")} style={styles.emojiButton}>🔥</button>
        <button onClick={() => sendEmojiReaction("👑")} style={styles.emojiButton}>👑</button>
        <button onClick={() => sendEmojiReaction("🎧")} style={styles.emojiButton}>🎧</button>
        <button onClick={() => sendEmojiReaction("🌟")} style={styles.emojiButton}>🌟</button>
      </footer>
    </div>
  );
}

