name: Build Android APK from Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -iname "audiostreamer.zip" -print -quit)
        if [ -n "$ZIP_FILE" ]; then
          echo "Found zip file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d temp_unzip
          
          NESTED_DIR=$(find temp_unzip -maxdepth 1 -type d -iname "audiostreamer" -print -quit)
          if [ -n "$NESTED_DIR" ]; then
            echo "Moving files from nested directory: $NESTED_DIR"
            cp -r "$NESTED_DIR"/* . 2>/dev/null || true
            cp -r "$NESTED_DIR"/.[a-zA-Z0-9]* . 2>/dev/null || true
          else
            echo "Moving files from zip root..."
            cp -r temp_unzip/* . 2>/dev/null || true
            cp -r temp_unzip/.[a-zA-Z0-9]* . 2>/dev/null || true
          fi
          rm -rf temp_unzip
        else
          echo "Error: Audiostreamer.zip not found!"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'

    # Overwrites app/build.gradle to add the WorkManager background dependency
    - name: Force Overwrite app/build.gradle
      shell: python
      run: |
        import os
        os.makedirs("app", exist_ok=True)
        with open("app/build.gradle", "w") as f:
            f.write("""plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }

        android {
            namespace 'com.example.audiostreamer'
            compileSdk 34

            defaultConfig {
                applicationId "com.example.audiostreamer"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }

        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.work:work-runtime-ktx:2.9.1'
        }""")

    # Overwrites string definitions to rename the app to Herbdout Radio
    - name: Force Overwrite strings.xml
      shell: python
      run: |
        import os
        os.makedirs("app/src/main/res/values", exist_ok=True)
        with open("app/src/main/res/values/strings.xml", "w") as f:
            f.write("""<resources>
            <string name="app_name">Herbdout Radio</string>
        </resources>""")

    # Configures the colors file for the custom launcher background
    - name: Create colors.xml
      shell: python
      run: |
        import os
        os.makedirs("app/src/main/res/values", exist_ok=True)
        with open("app/src/main/res/values/colors.xml", "w") as f:
            f.write("""<?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="ic_launcher_background">#080808</color>
        </resources>""")

    # Creates the launcher star icon foreground artwork
    - name: Create ic_star_logo_launcher drawable
      shell: python
      run: |
        import os
        os.makedirs("app/src/main/res/drawable", exist_ok=True)
        with open("app/src/main/res/drawable/ic_star_logo_launcher.xml", "w") as f:
            f.write("""<vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <group
                android:translateX="30"
                android:translateY="30"
                android:scaleX="2"
                android:scaleY="2">
                <path
                    android:fillColor="#5EFF00"
                    android:pathData="M12,0 L14.8,7.2 L22.1,4.5 L16.8,10.2 L24,12 L16.8,13.8 L22.1,19.5 L14.8,16.8 L12,24 L9.2,16.8 L1.9,19.5 L7.2,13.8 L0,12 L7.2,10.2 L1.9,4.5 L9.2,7.2 Z" />
            </group>
        </vector>""")

    # Creates adaptive launcher icons for compatibility across modern Android versions
    - name: Create adaptive launcher icons
      shell: python
      run: |
        import os
        os.makedirs("app/src/main/res/mipmap-anydpi-v26", exist_ok=True)
        
        ic_launcher_content = """<?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_star_logo_launcher"/>
        </adaptive-icon>"""
        
        with open("app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml", "w") as f:
            f.write(ic_launcher_content)
            
        with open("app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml", "w") as f:
            f.write(ic_launcher_content)

