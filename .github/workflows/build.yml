name: Build Android APK from Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -iname "audiostreamer.zip" -print -quit)
        if [ -n "$ZIP_FILE" ]; then
          echo "Found zip file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d temp_unzip
          
          NESTED_DIR=$(find temp_unzip -maxdepth 1 -type d -iname "audiostreamer" -print -quit)
          if [ -n "$NESTED_DIR" ]; then
            echo "Moving files from nested directory: $NESTED_DIR"
            cp -r "$NESTED_DIR"/* . 2>/dev/null || true
            cp -r "$NESTED_DIR"/.[a-zA-Z0-9]* . 2>/dev/null || true
          else
            echo "Moving files from zip root..."
            cp -r temp_unzip/* . 2>/dev/null || true
            cp -r temp_unzip/.[a-zA-Z0-9]* . 2>/dev/null || true
          fi
          rm -rf temp_unzip
        else
          echo "Error: Audiostreamer.zip not found!"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'

    # Automatically creates/fixes the AndroidX settings
    - name: Configure AndroidX Settings
      run: |
        echo "android.useAndroidX=true" > gradle.properties

    # Automatically overwrites MainActivity.kt with renamed variables to avoid name collisions
    - name: Force Overwrite MainActivity.kt
      run: |
        mkdir -p app/src/main/java/com/example/audiostreamer
        cat << 'EOF' > app/src/main/java/com/example/audiostreamer/MainActivity.kt
        package com.example.audiostreamer

        import android.media.AudioAttributes
        import android.media.MediaPlayer
        import android.os.Bundle
        import android.widget.Button
        import android.widget.TextView
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {

            private var mediaPlayer: MediaPlayer? = null
            private var isStreamActive = false
            private val streamUrl = "http://uk18freenew.listen2myradio.com:5784/stream"

            private lateinit var btnPlay: Button
            private lateinit var tvStatus: TextView

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)

                btnPlay = findViewById(R.id.btnPlay)
                tvStatus = findViewById(R.id.tvStatus)

                btnPlay.setOnClickListener {
                    togglePlayback()
                }
            }

            private fun togglePlayback() {
                if (!isStreamActive) {
                    startPlaying()
                } else {
                    stopPlaying()
                }
            }

            private fun startPlaying() {
                tvStatus.text = "Connecting..."
                btnPlay.isEnabled = false

                try {
                    mediaPlayer = MediaPlayer().apply {
                        setAudioAttributes(
                            AudioAttributes.Builder()
                                .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                                .setUsage(AudioAttributes.USAGE_MEDIA)
                                .build()
                        )
                        setDataSource(streamUrl)
                        setOnPreparedListener {
                            it.start()
                            isStreamActive = true
                            btnPlay.text = "Pause"
                            btnPlay.isEnabled = true
                            tvStatus.text = "Playing live stream"
                        }
                        setOnErrorListener { _, _, _ ->
                            tvStatus.text = "Error loading stream. Is it offline?"
                            resetPlayer()
                            true
                        }
                        prepareAsync()
                    }
                } catch (e: Exception) {
                    tvStatus.text = "Failed to initialize player"
                    resetPlayer()
                }
            }

            private fun stopPlaying() {
                resetPlayer()
                tvStatus.text = "Stopped"
            }

            private fun resetPlayer() {
                mediaPlayer?.let {
                    if (it.isPlaying) {
                        it.stop()
                    }
                    it.release()
                }
                mediaPlayer = null
                isStreamActive = false
                btnPlay.text = "Listen"
                btnPlay.isEnabled = true
            }

            override fun onDestroy() {
                super.onDestroy()
                resetPlayer()
            }
        }
        EOF

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
