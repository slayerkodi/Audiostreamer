name: Build Android APK from Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -iname "audiostreamer.zip" -print -quit)
        if [ -n "$ZIP_FILE" ]; then
          echo "Found zip file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d temp_unzip
          
          NESTED_DIR=$(find temp_unzip -maxdepth 1 -type d -iname "audiostreamer" -print -quit)
          if [ -n "$NESTED_DIR" ]; then
            echo "Moving files from nested directory: $NESTED_DIR"
            cp -r "$NESTED_DIR"/* . 2>/dev/null || true
            cp -r "$NESTED_DIR"/.[a-zA-Z0-9]* . 2>/dev/null || true
          else
            echo "Moving files from zip root..."
            cp -r temp_unzip/* . 2>/dev/null || true
            cp -r temp_unzip/.[a-zA-Z0-9]* . 2>/dev/null || true
          fi
          rm -rf temp_unzip
        else
          echo "Error: Audiostreamer.zip not found!"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        # Overwrites app/build.gradle to add the WorkManager background dependency
    - name: Force Overwrite app/build.gradle
      shell: python
      run: |
        import os
        os.makedirs("app", exist_ok=True)
        with open("app/build.gradle", "w") as f:
            f.write("""plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }

        android {
            namespace 'com.example.audiostreamer'
            compileSdk 34

            defaultConfig {
                applicationId "com.example.audiostreamer"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }

        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.work:work-runtime-ktx:2.9.1'
        }""")

    # Overwrites string definitions to rename the app to Herbdout Radio
    - name: Force Overwrite strings.xml
      shell: python
      run: |
        import os
        os.makedirs("app/src/main/res/values", exist_ok=True)
        with open("app/src/main/res/values/strings.xml", "w") as f:
            f.write("""<resources>
            <string name="app_name">Herbdout Radio</string>
