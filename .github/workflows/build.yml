name: Build Android APK from Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          if [ -f "audiostreamer.zip" ]; then
            unzip -o audiostreamer.zip -d .
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Force Overwrite app/build.gradle
        run: |
          mkdir -p app
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.example.audiostreamer'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.audiostreamer"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.work:work-runtime-ktx:2.9.1'
              
              implementation 'com.google.firebase:firebase-auth-ktx:22.3.1'
              
              implementation ('io.socket:socket.io-client:2.1.0') {
                  exclude group: 'org.json', module: 'json'
              }
          }
          EOF

      - name: Force Overwrite strings.xml
        run: |
          mkdir -p app/src/main/res/values
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Herbdout Radio</string>
          </resources>
          EOF

      - name: Create colors.xml
        run: |
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

      - name: Create ic_star_logo_launcher drawable
        run: |
          mkdir -p app/src/main/res/drawable
          cat << 'EOF' > app/src/main/res/drawable/ic_star_logo_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="512dp"
              android:height="512dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#5EFF00"
                  android:pathData="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z" />
          </vector>
          EOF

      - name: Create reaction_badge_bg drawable
        run: |
          cat << 'EOF' > app/src/main/res/drawable/reaction_badge_bg.xml
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="#26000000" />
              <stroke
                  android:width="1dp"
                  android:color="#335EFF00" />
              <corners android:radius="14dp" />
          </shape>
          EOF

      - name: Create chat_input_bg drawable
        run: |
          cat << 'EOF' > app/src/main/res/drawable/chat_input_bg.xml
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="#141414" />
              <stroke
                  android:width="1dp"
                  android:color="#222222" />
              <corners android:radius="12dp" />
          </shape>
          EOF

      - name: Force Overwrite AndroidManifest.xml
        run: |
          mkdir -p app/src/main
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_star_logo_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@drawable/ic_star_logo_launcher"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service 
                      android:name=".AudioService" 
                      android:foregroundServiceType="mediaPlayback"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

      - name: Configure AndroidX Settings
        run: |
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF

      - name: Create ic_star_logo drawable
        run: |
          cat << 'EOF' > app/src/main/res/drawable/ic_star_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="200dp"
              android:height="200dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#5EFF00"
                  android:pathData="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z" />
          </vector>
          EOF

      - name: Create settings.gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "audiostreamer"
          include ':app'
          EOF

      - name: Force Overwrite activity_main.xml
        run: |
          mkdir -p app/src/main/res/layout
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <androidx.constraintlayout.widget.ConstraintLayout 
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              xmlns:tools="http://schemas.android.com/tools"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#080808"
              tools:context=".MainActivity">

              <!-- Top Branding Bar -->
              <LinearLayout
                  android:id="@+id/topBar"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingLeft="24dp"
                  android:paddingRight="24dp"
                  android:paddingTop="24dp"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <ImageView
                      android:layout_width="28dp"
                      android:layout_height="28dp"
                      android:src="@drawable/ic_star_logo" />

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="HERBDOUT"
                      android:textColor="#FFFFFF"
                      android:textSize="14sp"
                      android:textStyle="bold"
                      android:letterSpacing="0.2"
                      android:layout_marginLeft="10dp" />

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="BROADCAST"
                      android:textColor="#5EFF00"
                      android:textSize="14sp"
                      android:letterSpacing="0.2"
                      android:layout_marginLeft="6dp" />
              </LinearLayout>

              <!-- Outlined chat control button in top right of main canvas -->
              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnToggleChat"
                  style="@style/Widget.Material3.Button.OutlinedButton"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Chat"
                  android:textColor="#5EFF00"
                  app:strokeColor="#5EFF00"
                  app:strokeWidth="1dp"
                  android:layout_marginEnd="24dp"
                  android:layout_marginTop="24dp"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />

              <!-- Centered Player Panel -->
              <com.google.android.material.card.MaterialCardView
                  android:id="@+id/recordCard"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  android:layout_marginLeft="24dp"
                  android:layout_marginRight="24dp"
                  android:layout_marginTop="16dp"
                  android:layout_marginBottom="24dp"
                  app:cardBackgroundColor="#0B0C0B"
                  app:strokeColor="#1A5EFF00"
                  app:strokeWidth="1dp"
                  app:cardCornerRadius="24dp"
                  app:layout_constraintTop_toBottomOf="@id/topBar"
                  app:layout_constraintBottom_toTopOf="@id/playerCard"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <androidx.constraintlayout.widget.ConstraintLayout
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:padding="24dp">

                      <!-- Title: NOW PLAYING -->
                      <TextView
                          android:id="@+id/tvNowPlayingLabel"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="●  NOW PLAYING"
                          android:textColor="#5EFF00"
                          android:textSize="12sp"
                          android:textStyle="bold"
                          android:letterSpacing="0.1"
                          app:layout_constraintTop_toTopOf="parent"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintEnd_toEndOf="parent" />

                      <!-- Concentric Vinyl Record Container -->
                      <androidx.constraintlayout.widget.ConstraintLayout
                          android:id="@+id/vinylRecord"
                          android:layout_width="220dp"
                          android:layout_height="220dp"
                          app:layout_constraintTop_toBottomOf="@id/tvNowPlayingLabel"
                          app:layout_constraintBottom_toTopOf="@id/tvTrackTitle"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintEnd_toEndOf="parent"
                          app:layout_constraintVertical_bias="0.4">

                          <!-- Outer ring -->
                          <com.google.android.material.card.MaterialCardView
                              android:layout_width="match_parent"
                              android:layout_height="match_parent"
                              app:cardCornerRadius="110dp"
                              app:cardBackgroundColor="#111211"
                              app:strokeColor="#222222"
                              app:strokeWidth="1.5dp">

                              <androidx.constraintlayout.widget.ConstraintLayout
                                  android:layout_width="match_parent"
                                  android:layout_height="match_parent">

                                  <!-- Grooves (Inner ring) -->
                                  <com.google.android.material.card.MaterialCardView
                                      android:layout_width="160dp"
                                      android:layout_height="160dp"
                                      app:cardCornerRadius="80dp"
                                      app:cardBackgroundColor="#181918"
                                      app:strokeColor="#282928"
                                      app:strokeWidth="1dp"
                                      app:layout_constraintTop_toTopOf="parent"
                                      app:layout_constraintBottom_toBottomOf="parent"
                                      app:layout_constraintStart_toStartOf="parent"
                                      app:layout_constraintEnd_toEndOf="parent">

                                      <!-- Center green badge as the record logo label -->
                                      <com.google.android.material.card.MaterialCardView
                                          android:layout_width="70dp"
                                          android:layout_height="70dp"
                                          app:cardCornerRadius="35dp"
                                          app:cardBackgroundColor="#5EFF00"
                                          app:layout_constraintTop_toTopOf="parent"
                                          app:layout_constraintBottom_toBottomOf="parent"
                                          app:layout_constraintStart_toStartOf="parent"
                                          app:layout_constraintEnd_toEndOf="parent"
                                          android:layout_gravity="center">

                                          <ImageView
                                              android:layout_width="28dp"
                                              android:layout_height="28dp"
                                              android:layout_gravity="center"
                                              android:src="@drawable/ic_star_logo"
                                              android:tint="#080808" />
                                      </com.google.android.material.card.MaterialCardView>
                                  </com.google.android.material.card.MaterialCardView>
                              </androidx.constraintlayout.widget.ConstraintLayout>
                          </com.google.android.material.card.MaterialCardView>
                      </androidx.constraintlayout.widget.ConstraintLayout>

                      <!-- Track metadata -->
                      <TextView
                          android:id="@+id/tvTrackTitle"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:text="LIVE STREAM BROADCAST"
                          android:textColor="#FFFFFF"
                          android:textSize="18sp"
                          android:textStyle="bold"
                          android:gravity="center"
                          android:ellipsize="end"
                          android:maxLines="1"
                          app:layout_constraintBottom_toTopOf="@id/tvArtist"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintEnd_toEndOf="parent"
                          android:layout_marginBottom="6dp" />

                      <!-- Track Artist -->
                      <TextView
                          android:id="@+id/tvArtist"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="HERBDOUT RADIO"
                          android:textColor="#5EFF00"
                          android:textSize="12sp"
                          android:textStyle="bold"
                          android:letterSpacing="0.05"
                          app:layout_constraintBottom_toBottomOf="parent"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintEnd_toEndOf="parent" />
                  </androidx.constraintlayout.widget.ConstraintLayout>
              </com.google.android.material.card.MaterialCardView>

              <!-- Slide-out Live Chat Panel -->
              <com.google.android.material.card.MaterialCardView
                  android:id="@+id/chatPanel"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  android:layout_marginLeft="24dp"
                  android:layout_marginRight="24dp"
                  android:layout_marginTop="16dp"
                  android:layout_marginBottom="24dp"
                  android:visibility="gone"
                  app:cardBackgroundColor="#0B0C0B"
                  app:strokeColor="#335EFF00"
                  app:strokeWidth="1dp"
                  app:cardCornerRadius="24dp"
                  app:layout_constraintTop_toBottomOf="@id/topBar"
                  app:layout_constraintBottom_toTopOf="@id/playerCard"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <androidx.constraintlayout.widget.ConstraintLayout
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:padding="16dp">

                      <!-- Chat Header -->
                      <RelativeLayout
                          android:id="@+id/chatHeader"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          app:layout_constraintTop_toTopOf="parent">

                          <TextView
                              android:layout_width="wrap_content"
                              android:layout_height="wrap_content"
                              android:text="LIVE CHAT ROOM"
                              android:textColor="#FFFFFF"
                              android:textSize="14sp"
                              android:textStyle="bold"
                              android:letterSpacing="0.1"
                              android:layout_alignParentStart="true"
                              android:layout_centerVertical="true" />

                          <Button
                              android:id="@+id/btnCloseChat"
                              style="@style/Widget.Material3.Button.TextButton"
                              android:layout_width="44dp"
                              android:layout_height="44dp"
                              android:text="✕"
                              android:textColor="#888888"
                              android:textSize="18sp"
                              android:layout_alignParentEnd="true" />
                      </RelativeLayout>

                      <!-- Scrollable message container list -->
                      <ScrollView
                          android:id="@+id/chatScrollView"
                          android:layout_width="match_parent"
                          android:layout_height="0dp"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="8dp"
                          app:layout_constraintTop_toBottomOf="@id/chatHeader"
                          app:layout_constraintBottom_toTopOf="@id/chatInputLayout">

                          <LinearLayout
                              android:id="@+id/chatContainer"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="vertical" />
                      </ScrollView>

                      <!-- Text input field and dispatch arrow container -->
                      <LinearLayout
                          android:id="@+id/chatInputLayout"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:gravity="center_vertical"
                          app:layout_constraintBottom_toBottomOf="parent">

                          <EditText
                              android:id="@+id/etChatMessage"
                              android:layout_width="0dp"
                              android:layout_height="44dp"
                              android:layout_weight="1"
                              android:hint="Type something..."
                              android:textColorHint="#555555"
                              android:textColor="#FFFFFF"
                              android:textSize="14sp"
                              android:background="@drawable/chat_input_bg"
                              android:paddingLeft="16dp"
                              android:paddingRight="16dp"
                              android:singleLine="true" />

                          <com.google.android.material.button.MaterialButton
                              android:id="@+id/btnSendChatMessage"
                              style="@style/Widget.Material3.Button"
                              android:layout_width="44dp"
                              android:layout_height="44dp"
                              android:layout_marginLeft="8dp"
                              android:backgroundTint="#5EFF00"
                              app:icon="@android:drawable/ic_menu_send"
                              app:iconTint="#080808"
                              app:iconGravity="textStart"
                              android:padding="0dp"
                              app:cornerRadius="12dp" />
                      </LinearLayout>
                  </androidx.constraintlayout.widget.ConstraintLayout>
              </com.google.android.material.card.MaterialCardView>

              <!-- Bottom Control & Emoji Panel -->
              <com.google.android.material.card.MaterialCardView
                  android:id="@+id/playerCard"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:layout_marginLeft="24dp"
                  android:layout_marginRight="24dp"
                  android:layout_marginBottom="24dp"
                  app:cardBackgroundColor="#0B0C0B"
                  app:strokeColor="#1A5EFF00"
                  app:strokeWidth="1dp"
                  app:cardCornerRadius="24dp"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <androidx.constraintlayout.widget.ConstraintLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:padding="20dp">

                      <!-- Broadcast Online Indicator/Status -->
                      <TextView
                          android:id="@+id/tvLiveStatus"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="  OFFLINE"
                          android:textColor="#888888"
                          android:textSize="12sp"
                          android:textStyle="bold"
                          android:letterSpacing="0.1"
                          app:layout_constraintTop_toTopOf="parent"
                          app:layout_constraintStart_toStartOf="parent" />

                      <!-- Realtime Status Subtext / Listen state descriptor -->
                      <TextView
                          android:id="@+id/tvStatus"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Press Listen to connect."
                          android:textColor="#888888"
                          android:textSize="13sp"
                          android:layout_marginTop="4dp"
                          app:layout_constraintTop_toBottomOf="@id/tvLiveStatus"
                          app:layout_constraintStart_toStartOf="parent" />

                      <!-- Control Elements (Play / Pause toggle button) -->
                      <com.google.android.material.button.MaterialButton
                          android:id="@+id/btnPlay"
                          android:layout_width="120dp"
                          android:layout_height="48dp"
                          android:text="Listen"
                          android:textColor="#080808"
                          android:textSize="14sp"
                          android:textStyle="bold"
                          android:backgroundTint="#5EFF00"
                          app:cornerRadius="16dp"
                          app:layout_constraintTop_toTopOf="parent"
                          app:layout_constraintBottom_toBottomOf="parent"
                          app:layout_constraintEnd_toEndOf="parent" />

                      <View
                          android:id="@+id/divider"
                          android:layout_width="match_parent"
                          android:layout_height="1dp"
                          android:background="#1A5EFF00"
                          android:layout_marginTop="20dp"
                          app:layout_constraintTop_toBottomOf="@id/tvStatus" />

                      <!-- Fast Send Emoji Drawer Row -->
                      <LinearLayout
                          android:id="@+id/emojiDrawer"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal"
                          android:gravity="center"
                          android:layout_marginTop="16dp"
                          app:layout_constraintTop_toBottomOf="@id/divider">

                          <Button
                              android:id="@+id/emoji_fire"
                              style="@style/Widget.Material3.Button.TextButton"
                              android:layout_width="48dp"
                              android:layout_height="48dp"
                              android:text="🔥"
                              android:textSize="22sp" />

                          <Button
                              android:id="@+id/emoji_heart"
                              style="@style/Widget.Material3.Button.TextButton"
                              android:layout_width="48dp"
                              android:layout_height="48dp"
                              android:text="❤️"
                              android:textSize="22sp" />

                          <Button
                              android:id="@+id/emoji_hundred"
                              style="@style/Widget.Material3.Button.TextButton"
                              android:layout_width="48dp"
                              android:layout_height="48dp"
                              android:text="💯"
                              android:textSize="22sp" />

                          <Button
                              android:id="@+id/emoji_cool"
                              style="@style/Widget.Material3.Button.TextButton"
                              android:layout_width="48dp"
                              android:layout_height="48dp"
                              android:text="😎"
                              android:textSize="22sp" />

                          <Button
                              android:id="@+id/emoji_star"
                              style="@style/Widget.Material3.Button.TextButton"
                              android:layout_width="48dp"
                              android:layout_height="48dp"
                              android:text="⭐"
                              android:textSize="22sp" />
                      </LinearLayout>
                  </androidx.constraintlayout.widget.ConstraintLayout>
              </com.google.android.material.card.MaterialCardView>

              <!-- Full-screen transparent overlay container for floating emojis -->
              <FrameLayout
                  android:id="@+id/emojiContainer"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  android:elevation="12dp"
                  android:clickable="false"
                  android:focusable="false"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent" />
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

      - name: Create StreamCheckWorker.kt
        run: |
          mkdir -p app/src/main/java/com/example/audiostreamer
          cat << 'EOF' > app/src/main/java/com/example/audiostreamer/StreamCheckWorker.kt
          package com.example.audiostreamer

          import android.content.Context
          import androidx.core.app.NotificationCompat
          import androidx.core.app.NotificationManagerCompat
          import androidx.work.CoroutineWorker
          import androidx.work.WorkerParameters
          import java.net.HttpURLConnection
          import java.net.URL

          class StreamCheckWorker(context: Context, params: WorkerParameters) : CoroutineWorker(context, params) {
              override suspend fun doWork(): Result {
                  val isOnline = checkRadioBroadcastingState()
                  if (isOnline) {
                      triggerSuccessNotification()
                  }
                  return Result.success()
              }

              private fun checkRadioBroadcastingState(): Boolean {
                  return try {
                      val connection = URL("https://herbdout.radio12345.com/").openConnection() as HttpURLConnection
                      connection.connectTimeout = 4000
                      connection.readTimeout = 4000
                      connection.requestMethod = "HEAD"
                      val code = connection.responseCode
                      code in 200..399
                  } catch (e: Exception) {
                      false
                  }
              }

              private fun triggerSuccessNotification() {
                  val builder = NotificationCompat.Builder(applicationContext, "RADIO_STATUS_CHANNEL")
                      .setSmallIcon(R.drawable.ic_star_logo_launcher)
                      .setContentTitle("Herbdout Radio")
                      .setContentText("Herbdout is currently live broadcasting right now!")
                      .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                      .setAutoCancel(true)

                  val notification = builder.build()
                  try {
                      NotificationManagerCompat.from(applicationContext).notify(1001, notification)
                  } catch (e: SecurityException) {
                      // Ignored
                  }
              }
          }
          EOF

      - name: Create AudioService.kt
        run: |
          cat << 'EOF' > app/src/main/java/com/example/audiostreamer/AudioService.kt
          package com.example.audiostreamer

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.content.pm.ServiceInfo
          import android.media.AudioAttributes
          import android.media.MediaPlayer
          import android.os.Binder
          import android.os.Build
          import android.os.Handler
          import android.os.IBinder
          import android.os.Looper
          import android.os.PowerManager
          import androidx.core.app.NotificationCompat
          import java.net.HttpURLConnection
          import java.net.URL
          import kotlin.concurrent.thread

          class AudioService : Service() {

              private val binder = LocalBinder()
              private var mediaPlayer: MediaPlayer? = null
              private val notificationId = 1
              private val channelId = "radio_service_channel"

              var isStreamPlaying = false
                  private set

              var isConnecting = false
                  private set

              var isError = false
                  private set

              private val timeoutHandler = Handler(Looper.getMainLooper())
              private val timeoutRunnable = Runnable {
                  if (isConnecting) {
                      handleError()
                  }
              }

              inner class LocalBinder : Binder() {
                  fun getService(): AudioService = this@AudioService
              }

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(
                          notificationId, 
                          createNotification("Connecting to Herbdout Radio..."), 
                          ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PLAYBACK
                      )
                  } else {
                      startForeground(notificationId, createNotification("Connecting to Herbdout Radio..."))
                  }
                  return START_STICKY
              }

              override fun onBind(intent: Intent?): IBinder {
                  return binder
              }

              fun play() {
                  if (isStreamPlaying || isConnecting) return
                  isConnecting = true
                  isError = false
                  notifyStateChanged()

                  timeoutHandler.postDelayed(timeoutRunnable, 10000)

                  thread {
                      try {
                          val activeStreamUrl = fetchActiveStreamUrl()
                          if (activeStreamUrl != null) {
                              initializeMediaPlayer(activeStreamUrl)
                          } else {
                              Handler(Looper.getMainLooper()).post { handleError() }
                          }
                      } catch (e: Exception) {
                          Handler(Looper.getMainLooper()).post { handleError() }
                      }
                  }
              }

              private fun fetchActiveStreamUrl(): String? {
                  return try {
                      val connection = URL("https://herbdout.radio12345.com/").openConnection() as HttpURLConnection
                      connection.connectTimeout = 4000
                      connection.readTimeout = 4000
                      connection.requestMethod = "HEAD"
                      val code = connection.responseCode
                      if (code in 200..399) "https://herbdout.radio12345.com/" else null
                  } catch (e: Exception) {
                      null
                  }
              }

              private fun initializeMediaPlayer(streamUrl: String) {
                  mediaPlayer?.release()
                  mediaPlayer = MediaPlayer().apply {
                      setWakeMode(applicationContext, PowerManager.PARTIAL_WAKE_LOCK)
                      setAudioAttributes(
                          AudioAttributes.Builder()
                              .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                              .setUsage(AudioAttributes.USAGE_MEDIA)
                              .build()
                      )
                      setDataSource(streamUrl)
                      setOnPreparedListener { mp ->
                          timeoutHandler.removeCallbacks(timeoutRunnable)
                          isConnecting = false
                          isStreamPlaying = true
                          isError = false
                          mp.start()
                          updateNotification("Now Streaming Herbdout Radio")
                          notifyStateChanged()
                      }
                      setOnErrorListener { _, _, _ ->
                          handleError()
                          true
                      }
                      prepareAsync()
                  }
              }

              fun pause() {
                  if (mediaPlayer?.isPlaying == true) {
                      mediaPlayer?.stop()
                  }
                  mediaPlayer?.release()
                  mediaPlayer = null
                  isStreamPlaying = false
                  isConnecting = false
                  notifyStateChanged()
                  stopForeground(true)
                  stopSelf()
              }

              private fun handleError() {
                  timeoutHandler.removeCallbacks(timeoutRunnable)
                  isConnecting = false
                  isStreamPlaying = false
                  isError = true
                  notifyStateChanged()
                  stopForeground(true)
                  stopSelf()
              }

              private fun notifyStateChanged() {
                  val intent = Intent("com.example.audiostreamer.STATE_CHANGED")
                  sendBroadcast(intent)
              }

              private fun createNotification(content: String): Notification {
                  return NotificationCompat.Builder(this, channelId)
                      .setContentTitle("Herbdout Radio")
                      .setContentText(content)
                      .setSmallIcon(R.drawable.ic_star_logo_launcher)
                      .setOngoing(true)
                      .build()
              }

              private fun updateNotification(content: String) {
                  val notification = createNotification(content)
                  val notificationManager = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                  notificationManager.notify(notificationId, notification)
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val serviceChannel = NotificationChannel(
                          channelId,
                          "Radio Playback Channel",
                          NotificationManager.IMPORTANCE_LOW
                      )
                      val manager = getSystemService(NotificationManager::class.java)
                      manager?.createNotificationChannel(serviceChannel)
                  }
              }

              override fun onDestroy() {
                  mediaPlayer?.release()
                  mediaPlayer = null
                  super.onDestroy()
              }
          }
          EOF

      - name: Force Overwrite MainActivity.kt
        run: |
          cat << 'EOF' > app/src/main/java/com/example/audiostreamer/MainActivity.kt
          package com.example.audiostreamer

          import android.animation.ObjectAnimator
          import android.content.BroadcastReceiver
          import android.content.ComponentName
          import android.content.Context
          import android.content.Intent
          import android.content.IntentFilter
          import android.content.ServiceConnection
          import android.content.res.ColorStateList
          import android.graphics.Color
          import android.os.Bundle
          import android.os.IBinder
          import android.view.View
          import android.view.animation.LinearInterpolator
          import android.widget.Button
          import android.widget.EditText
          import android.widget.ImageView
          import android.widget.LinearLayout
          import android.widget.ScrollView
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.constraintlayout.widget.ConstraintLayout
          import com.google.android.material.button.MaterialButton
          import com.google.android.material.card.MaterialCardView
          import com.google.firebase.auth.FirebaseAuth
          import io.socket.client.IO
          import io.socket.client.Socket
          import org.json.JSONObject
          import java.util.Random

          class MainActivity : AppCompatActivity() {

              private var isChatVisible = false
              private var mSocket: Socket? = null

              private lateinit var topBar: LinearLayout
              private lateinit var btnToggleChat: MaterialButton
              private lateinit var recordCard: MaterialCardView
              private lateinit var chatPanel: MaterialCardView
              private lateinit var playerCard: MaterialCardView
              private lateinit var emojiContainer: android.widget.FrameLayout

              private lateinit var btnCloseChat: Button
              private lateinit var etChatMessage: EditText
              private lateinit var btnSendChatMessage: MaterialButton
              private lateinit var chatScrollView: ScrollView
              private lateinit var chatContainer: LinearLayout

              private lateinit var btnPlay: MaterialButton
              private lateinit var tvLiveStatus: TextView
              private lateinit var tvStatus: TextView
              private lateinit var recordAnimator: ObjectAnimator

              private var audioService: AudioService? = null
              private var isBound = false

              private val connection = object : ServiceConnection {
                  override fun onServiceConnected(className: ComponentName, service: IBinder) {
                      val binder = service as AudioService.LocalBinder
                      audioService = binder.getService()
                      isBound = true
                      updateUIFromServiceState()
                  }

                  override fun onServiceDisconnected(arg0: ComponentName) {
                      isBound = false
                  }
              }

              private val stateReceiver = object : BroadcastReceiver() {
                  override fun onReceive(context: Context?, intent: Intent?) {
                      updateUIFromServiceState()
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  window.statusBarColor = Color.parseColor("#080808")
                  window.navigationBarColor = Color.parseColor("#080808")

                  setupViews()
                  setupAnimations()
                  setupButtons()
                  setupSocketConnection()

                  val intent = Intent(this, AudioService::class.java)
                  bindService(intent, connection, Context.BIND_AUTO_CREATE)

                  val filter = IntentFilter("com.example.audiostreamer.STATE_CHANGED")
                  registerReceiver(stateReceiver, filter, RECEIVER_EXPORTED)
              }

              private fun setupViews() {
                  topBar = findViewById(R.id.topBar)
                  btnToggleChat = findViewById(R.id.btnToggleChat)
                  recordCard = findViewById(R.id.recordCard)
                  chatPanel = findViewById(R.id.chatPanel)
                  playerCard = findViewById(R.id.playerCard)
                  emojiContainer = findViewById(R.id.emojiContainer)

                  btnCloseChat = findViewById(R.id.btnCloseChat)
                  etChatMessage = findViewById(R.id.etChatMessage)
                  btnSendChatMessage = findViewById(R.id.btnSendChatMessage)
                  chatScrollView = findViewById(R.id.chatScrollView)
                  chatContainer = findViewById(R.id.chatContainer)

                  btnPlay = findViewById(R.id.btnPlay)
                  tvLiveStatus = findViewById(R.id.tvLiveStatus)
                  tvStatus = findViewById(R.id.tvStatus)
              }

              private fun setupAnimations() {
                  val vinylRecord: ConstraintLayout = findViewById(R.id.vinylRecord)
                  recordAnimator = ObjectAnimator.ofFloat(vinylRecord, "rotation", 0f, 360f).apply {
                      duration = 8000
                      repeatCount = ObjectAnimator.INFINITE
                      interpolator = LinearInterpolator()
                  }
              }

              private fun setupButtons() {
                  btnToggleChat.setOnClickListener {
                      isChatVisible = !isChatVisible
                      if (isChatVisible) {
                          recordCard.visibility = View.GONE
                          chatPanel.visibility = View.VISIBLE
                          btnToggleChat.text = "Player"
                      } else {
                          chatPanel.visibility = View.GONE
                          recordCard.visibility = View.VISIBLE
                          btnToggleChat.text = "Chat"
                      }
                  }

                  btnCloseChat.setOnClickListener {
                      isChatVisible = false
                      chatPanel.visibility = View.GONE
                      recordCard.visibility = View.VISIBLE
                      btnToggleChat.text = "Chat"
                  }

                  btnPlay.setOnClickListener {
                      val service = audioService
                      if (service != null) {
                          if (service.isStreamPlaying) {
                              service.pause()
                          } else {
                              val startIntent = Intent(this, AudioService::class.java)
                              startForegroundService(startIntent)
                              service.play()
                          }
                      }
                  }

                  btnSendChatMessage.setOnClickListener {
                      val msg = etChatMessage.text.toString().trim()
                      if (msg.isNotEmpty()) {
                          sendChatMessageToServer(msg)
                          etChatMessage.text.clear()
                      }
                  }

                  findViewById<Button>(R.id.emoji_fire).setOnClickListener { sendEmoji("🔥") }
                  findViewById<Button>(R.id.emoji_heart).setOnClickListener { sendEmoji("❤️") }
                  findViewById<Button>(R.id.emoji_hundred).setOnClickListener { sendEmoji("💯") }
                  findViewById<Button>(R.id.emoji_cool).setOnClickListener { sendEmoji("😎") }
                  findViewById<Button>(R.id.emoji_star).setOnClickListener { sendEmoji("⭐") }
              }

              private fun setupSocketConnection() {
                  try {
                      val opts = IO.Options().apply {
                          transports = arrayOf("websocket")
                      }
                      mSocket = IO.socket("https://herbdout.radio12345.com/", opts).apply {
                          on(Socket.EVENT_CONNECT) {
                              runOnUiThread {
                                  addSystemMessageToUI("Connected to chat server.")
                              }
                          }
                          on(Socket.EVENT_CONNECT_ERROR) {
                              runOnUiThread {
                                  addSystemMessageToUI("Connect error.")
                              }
                          }
                          on("chat-message") { args ->
                              if (args.isNotEmpty()) {
                                  val data = args[0] as? JSONObject
                                  if (data != null) {
                                      runOnUiThread {
                                          val sender = data.optString("username", "Anonymous")
                                          val msg = data.optString("text", "")
                                          addChatMessageToUI(sender, msg)
                                      }
                                  }
                              }
                          }
                          on("new-emoji") { args ->
                              if (args.isNotEmpty()) {
                                  val data = args[0] as? JSONObject
                                  if (data != null) {
                                      val emoji = data.optString("emoji", "🔥")
                                      val sender = data.optString("username", "Anonymous")
                                      val avatar = data.optString("avatar", "")
                                      runOnUiThread {
                                          showFloatingEmoji(emoji, sender, avatar)
                                      }
                                  }
                              }
                          }
                          connect()
                      }
                  } catch (e: Exception) {
                      e.printStackTrace()
                      addSystemMessageToUI("Socket initialization failed.")
                  }
              }

              private fun sendChatMessageToServer(text: String) {
                  var username = "Listener"
                  var avatar = ""

                  try {
                      val auth = FirebaseAuth.getInstance()
                      val user = auth.currentUser
                      if (user != null) {
                          username = user.displayName ?: "Listener"
                          avatar = user.photoUrl?.toString() ?: ""
                      }
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }

                  val msgObj = JSONObject().apply {
                      put("username", username)
                      put("text", text)
                      put("avatar", avatar)
                  }
                  mSocket?.emit("chat-message", msgObj)
                  addChatMessageToUI("You ($username)", text)
              }

              private fun sendEmoji(emoji: String) {
                  var username = "Listener"
                  var avatar = ""

                  try {
                      val auth = FirebaseAuth.getInstance()
                      val user = auth.currentUser
                      if (user != null) {
                          username = user.displayName ?: "Listener"
                          avatar = user.photoUrl?.toString() ?: ""
                      }
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }

                  val emojiObj = JSONObject().apply {
                      put("username", username)
                      put("emoji", emoji)
                      put("avatar", avatar)
                  }
                  mSocket?.emit("send-emoji", emojiObj)
                  showFloatingEmoji(emoji, username, avatar)
              }

              private fun showFloatingEmoji(emoji: String, username: String, avatar: String) {
                  runOnUiThread {
                      val badgeView = TextView(this).apply {
                          text = "$username: $emoji"
                          setTextColor(Color.WHITE)
                          setTextSize(14f)
                          setTypeface(null, android.graphics.Typeface.BOLD)
                          setBackgroundResource(R.drawable.reaction_badge_bg)
                          setPadding(24, 12, 24, 12)
                      }

                      val badgeParams = android.widget.FrameLayout.LayoutParams(
                          android.widget.FrameLayout.LayoutParams.WRAP_CONTENT,
                          android.widget.FrameLayout.LayoutParams.WRAP_CONTENT
                      )
                      badgeView.layoutParams = badgeParams
                      emojiContainer.addView(badgeView)

                      val randomWidth = emojiContainer.width - 250
                      val startX = if (randomWidth > 0) Random().nextInt(randomWidth).toFloat() + 50f else 50f
                      val startY = emojiContainer.height.toFloat() - 100f

                      badgeView.x = startX
                      badgeView.y = startY

                      val deltaY = 600f
                      val animY = ObjectAnimator.ofFloat(badgeView, "translationY", startY, startY - deltaY)
                      val animAlpha = ObjectAnimator.ofFloat(badgeView, "alpha", 1.0f, 0.0f)

                      android.animation.AnimatorSet().apply {
                          playTogether(animY, animAlpha)
                          duration = 3000
                          addListener(object : android.animation.Animator.AnimatorListener {
                              override fun onAnimationStart(animation: android.animation.Animator) {}
                              override fun onAnimationEnd(animation: android.animation.Animator) {
                                  emojiContainer.removeView(badgeView)
                              }
                              override fun onAnimationCancel(animation: android.animation.Animator) {}
                              override fun onAnimationRepeat(animation: android.animation.Animator) {}
                          })
                          start()
                      }
                  }
              }

              private fun addChatMessageToUI(sender: String, text: String) {
                  val bubbleLayout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setBackgroundColor(Color.parseColor("#121212"))
                      setPadding(16, 12, 16, 12)
                      val layoutParams = LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      ).apply {
                          setMargins(0, 0, 0, 16)
                      }
                      this.layoutParams = layoutParams
                  }

                  val tvSender = TextView(this).apply {
                      this.text = sender
                      setTextColor(Color.parseColor("#5EFF00"))
                      setTextSize(12f)
                      setTypeface(null, android.graphics.Typeface.BOLD)
                      val params = LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.WRAP_CONTENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      )
                      this.layoutParams = params
                  }

                  val tvText = TextView(this).apply {
                      this.text = text
                      setTextColor(Color.WHITE)
                      setTextSize(14f)
                      val params = LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      ).apply {
                          topMargin = 4
                      }
                      this.layoutParams = params
                  }

                  bubbleLayout.addView(tvSender)
                  bubbleLayout.addView(tvText)
                  chatContainer.addView(bubbleLayout)

                  chatScrollView.post {
                      chatScrollView.fullScroll(ScrollView.FOCUS_DOWN)
                  }
              }

              private fun addSystemMessageToUI(msg: String) {
                  val tvSystem = TextView(this).apply {
                      text = msg
                      setTextColor(Color.parseColor("#888888"))
                      setTextSize(12f)
                      val params = LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      ).apply {
                          setMargins(0, 0, 0, 12)
                      }
                      layoutParams = params
                  }
                  chatContainer.addView(tvSystem)
              }

              private fun updateUIFromServiceState() {
                  val service = audioService
                  if (service != null && isBound) {
                      if (service.isStreamPlaying) {
                          btnPlay.text = "Disconnect"
                          btnPlay.isEnabled = true
                          tvLiveStatus.text = "●  STREAM ONLINE"
                          tvLiveStatus.setTextColor(Color.parseColor("#5EFF00"))
                          tvStatus.text = "Now connected to Herbdout Radio\\nEnjoy the live stream broadcast!"
                          tvStatus.setTextColor(Color.parseColor("#5EFF00"))

                          if (!recordAnimator.isRunning) {
                              recordAnimator.start()
                          }
                      } else if (service.isConnecting) {
                          btnPlay.text = "Connecting"
                          btnPlay.isEnabled = false
                          tvLiveStatus.text = "●  CONNECTING..."
                          tvLiveStatus.setTextColor(Color.parseColor("#FFD700"))
                          tvStatus.text = "Buffering broadcast audio, please hold..."
                          tvStatus.setTextColor(Color.parseColor("#FFD700"))

                          if (recordAnimator.isRunning) {
                              recordAnimator.cancel()
                          }
                      } else if (service.isError) {
                          btnPlay.text = "Listen"
                          btnPlay.isEnabled = true
                          tvLiveStatus.text = "  OFFLINE"
                          tvLiveStatus.setTextColor(Color.parseColor("#888888"))
                          tvStatus.text = "Radio is not broadcasting right now.\\nPlease try again later."
                          tvStatus.setTextColor(Color.parseColor("#EF4444"))

                          if (recordAnimator.isRunning) {
                              recordAnimator.cancel()
                          }
                      } else {
                          btnPlay.text = "Listen"
                          btnPlay.isEnabled = true
                          tvLiveStatus.text = "  OFFLINE"
                          tvLiveStatus.setTextColor(Color.parseColor("#888888"))
                          tvStatus.text = "Press Listen to connect."
                          tvStatus.setTextColor(Color.parseColor("#888888"))

                          if (recordAnimator.isRunning) {
                              recordAnimator.cancel()
                          }
                      }
                  }
              }

              override fun onResume() {
                  super.onResume()
                  updateUIFromServiceState()
                  mSocket?.connect()
              }

              override fun onDestroy() {
                  if (isBound) {
                      unbindService(connection)
                      isBound = false
                  }
                  try {
                      unregisterReceiver(stateReceiver)
                  } catch (e: Exception) {
                      // Ignored
                  }
                  mSocket?.disconnect()
                  super.onDestroy()
              }
          }
          EOF

      - name: Build Android APK
        run: |
          mkdir -p gradle/wrapper
          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
