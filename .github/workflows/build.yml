name: Build Android APK from Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -iname "audiostreamer.zip" -print -quit)
        if [ -n "$ZIP_FILE" ]; then
          echo "Found zip file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d temp_unzip
          
          NESTED_DIR=$(find temp_unzip -maxdepth 1 -type d -iname "audiostreamer" -print -quit)
          if [ -n "$NESTED_DIR" ]; then
            echo "Moving files from nested directory: $NESTED_DIR"
            cp -r "$NESTED_DIR"/* . 2>/dev/null || true
            cp -r "$NESTED_DIR"/.[a-zA-Z0-9]* . 2>/dev/null || true
          else
            echo "Moving files from zip root..."
            cp -r temp_unzip/* . 2>/dev/null || true
            cp -r temp_unzip/.[a-zA-Z0-9]* . 2>/dev/null || true
          fi
          rm -rf temp_unzip
        else
          echo "Error: Audiostreamer.zip not found!"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'

    # This creates the missing settings file dynamically to fix the build error
    - name: Configure AndroidX Settings
      run: |
        echo "android.useAndroidX=true" > gradle.properties

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
