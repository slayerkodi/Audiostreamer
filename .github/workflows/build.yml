name: Build Native Android APK from React SPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Installs dependencies
    - name: Install Dependencies
      run: npm install

    # Builds the React/Vite project into a static web bundle
    - name: Build Web SPA
      run: npm run build

    # Initializes Capacitor, adds Android, and syncs the built web files
    - name: Package for Android (Capacitor)
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Herbdout Radio" "com.herbdout.radio" --web-dir=dist
        npx cap add android
        npx cap sync android

    # Configures AndroidManifest to allow HTTP streams and background activity
    - name: Configure Native Android Permissions
      shell: python
      run: |
        import os
        manifest_path = "android/app/src/main/AndroidManifest.xml"
        if os.path.exists(manifest_path):
            with open(manifest_path, "r") as f:
                content = f.read()
            # Allow cleartext (HTTP) traffic for audio streaming
            if 'android:usesCleartextTraffic="true"' not in content:
                content = content.replace("<application", '<application android:usesCleartextTraffic="true"')
            # Ensure Internet and WakeLock permissions
            if '<uses-permission android:name="android.permission.INTERNET" />' not in content:
                content = content.replace("<manifest", '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <manifest')
            with open(manifest_path, "w") as f:
                f.write(content)

    # Compiles the final APK
    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    # Uploads the APK to the GitHub Actions artifacts
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Herbdout-Radio-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
