name: Build Android APK from Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -iname "audiostreamer.zip" -print -quit)
        if [ -n "$ZIP_FILE" ]; then
          echo "Found zip file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d temp_unzip
          
          NESTED_DIR=$(find temp_unzip -maxdepth 1 -type d -iname "audiostreamer" -print -quit)
          if [ -n "$NESTED_DIR" ]; then
            echo "Moving files from nested directory: $NESTED_DIR"
            cp -r "$NESTED_DIR"/* . 2>/dev/null || true
            cp -r "$NESTED_DIR"/.[a-zA-Z0-9]* . 2>/dev/null || true
          else
            echo "Moving files from zip root..."
            cp -r temp_unzip/* . 2>/dev/null || true
            cp -r temp_unzip/.[a-zA-Z0-9]* . 2>/dev/null || true
          fi
          rm -rf temp_unzip
        else
          echo "Error: Audiostreamer.zip not found!"
          exit 1
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'

    # Overwrites string definitions to rename the app to Herbdout Radio
    - name: Force Overwrite strings.xml
      run: |
        mkdir -p app/src/main/res/values
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Herbdout Radio</string>
        </resources>
        EOF

    # Configures the colors file for the custom launcher background
    - name: Create colors.xml
      run: |
        mkdir -p app/src/main/res/values
        cat << 'EOF' > app/src/main/res/values/colors.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="ic_launcher_background">#080808</color>
        </resources>
        EOF

    # Creates the launcher star icon foreground artwork
    - name: Create ic_star_logo_launcher drawable
      run: |
        mkdir -p app/src/main/res/drawable
        cat << 'EOF' > app/src/main/res/drawable/ic_star_logo_launcher.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <group
                android:translateX="30"
                android:translateY="30"
                android:scaleX="2"
                android:scaleY="2">
                <path
                    android:fillColor="#5EFF00"
                    android:pathData="M12,0 L14.8,7.2 L22.1,4.5 L16.8,10.2 L24,12 L16.8,13.8 L22.1,19.5 L14.8,16.8 L12,24 L9.2,16.8 L1.9,19.5 L7.2,13.8 L0,12 L7.2,10.2 L1.9,4.5 L9.2,7.2 Z" />
            </group>
        </vector>
        EOF

    # Creates adaptive launcher icons for compatibility across modern Android versions
    - name: Create adaptive launcher icons
      run: |
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_star_logo_launcher"/>
        </adaptive-icon>
        EOF

        cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_star_logo_launcher"/>
        </adaptive-icon>
        EOF

    # Overwrites manifest settings to declare the updated app name and link the custom launcher icon
    - name: Force Overwrite AndroidManifest.xml
      run: |
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.audiostreamer">

            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />

            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:label="@string/app_name"
                android:supportsRtl="true"
                android:theme="@style/Theme.AudioStreamer"
                android:usesCleartextTraffic="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>

        </manifest>
        EOF

    # Automatically creates/fixes the AndroidX settings
    - name: Configure AndroidX Settings
      run: |
        echo "android.useAndroidX=true" > gradle.properties

    # Creates the precise 8-pointed electric green star logo
    - name: Create ic_star_logo drawable
      run: |
        mkdir -p app/src/main/res/drawable
        cat << 'EOF' > app/src/main/res/drawable/ic_star_logo.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="24dp"
            android:height="24dp"
            android:viewportWidth="24"
            android:viewportHeight="24">
            <path
                android:fillColor="#5EFF00"
                android:pathData="M12,0 L14.8,7.2 L22.1,4.5 L16.8,10.2 L24,12 L16.8,13.8 L22.1,19.5 L14.8,16.8 L12,24 L9.2,16.8 L1.9,19.5 L7.2,13.8 L0,12 L7.2,10.2 L1.9,4.5 L9.2,7.2 Z" />
        </vector>
        EOF

    # Creates a custom green circle drawable for the pulsing live dot
    - name: Create green_dot drawable
      run: |
        mkdir -p app/src/main/res/drawable
        cat << 'EOF' > app/src/main/res/drawable/green_dot.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android"
            android:shape="oval">
            <solid android:color="#5EFF00" />
        </shape>
        EOF

    # Overwrites the UI layout with the OLED design matching Image 2
    - name: Force Overwrite activity_main.xml
      run: |
        mkdir -p app/src/main/res/layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <androidx.constraintlayout.widget.ConstraintLayout 
            xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            xmlns:tools="http://schemas.android.com/tools"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#080808"
            tools:context=".MainActivity">

            <!-- Top Branding Bar -->
            <LinearLayout
                android:id="@+id/topBar"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="horizontal"
                android:gravity="center_vertical"
                android:paddingLeft="24dp"
                android:paddingRight="24dp"
                android:paddingTop="24dp"
                app:layout_constraintTop_toTopOf="parent">

                <ImageView
                    android:layout_width="44dp"
                    android:layout_height="44dp"
                    android:src="@drawable/ic_star_logo"
                    android:contentDescription="Station Logo" />

                <LinearLayout
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:orientation="vertical"
                    android:layout_marginStart="14dp">

                    <LinearLayout
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:orientation="horizontal">

                        <TextView
                            android:layout_width="wrap_content"
                            android:layout_height="wrap_content"
                            android:text="HERBDOUT"
                            android:textColor="#FFFFFF"
                            android:textSize="22sp"
                            android:textStyle="bold|italic" />

                        <TextView
                            android:layout_width="wrap_content"
                            android:layout_height="wrap_content"
                            android:text="RADIO"
                            android:textColor="#5EFF00"
                            android:textSize="22sp"
                            android:textStyle="bold|italic" />
                    </LinearLayout>

                    <!-- Status indicators -->
                    <LinearLayout
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:orientation="horizontal"
                        android:gravity="center_vertical"
                        android:layout_marginTop="2dp">

                        <View
                            android:id="@+id/liveDot"
                            android:layout_width="6dp"
                            android:layout_height="6dp"
                            android:background="@drawable/green_dot"
                            android:layout_marginEnd="6dp"
                            android:visibility="gone" />

                        <TextView
                            android:id="@+id/tvLiveStatus"
                            android:layout_width="wrap_content"
                            android:layout_height="wrap_content"
                            android:text="OFF AIR"
                            android:textColor="#888888"
                            android:textSize="11sp"
                            android:textStyle="bold"
                            android:letterSpacing="0.05" />
                    </LinearLayout>

                </LinearLayout>
            </LinearLayout>

            <!-- Centered Player Panel -->
            <com.google.android.material.card.MaterialCardView
                android:id="@+id/recordCard"
                android:layout_width="match_parent"
                android:layout_height="0dp"
                android:layout_marginLeft="24dp"
                android:layout_marginRight="24dp"
                android:layout_marginTop="16dp"
                android:layout_marginBottom="24dp"
                app:cardBackgroundColor="#0B0C0B"
                app:strokeColor="#1A5EFF00"
                app:strokeWidth="1dp"
                app:cardCornerRadius="24dp"
                app:layout_constraintTop_toBottomOf="@id/topBar"
                app:layout_constraintBottom_toTopOf="@id/playerCard">

                <androidx.constraintlayout.widget.ConstraintLayout
                    android:layout_width="match_parent"
                    android:layout_height="match_parent"
                    android:padding="24dp">

                    <!-- Title: NOW PLAYING -->
                    <TextView
                        android:id="@+id/tvNowPlayingLabel"
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:text="●  NOW PLAYING"
                        android:textColor="#5EFF00"
                        android:textSize="12sp"
                        android:textStyle="bold"
                        android:letterSpacing="0.1"
                        app:layout_constraintTop_toTopOf="parent"
                        app:layout_constraintLeft_toLeftOf="parent"
                        app:layout_constraintRight_toRightOf="parent" />

                    <!-- Concentric Vinyl Record Container -->
                    <androidx.constraintlayout.widget.ConstraintLayout
                        android:id="@+id/vinylRecord"
                        android:layout_width="220dp"
                        android:layout_height="220dp"
                        app:layout_constraintTop_toBottomOf="@id/tvNowPlayingLabel"
                        app:layout_constraintBottom_toTopOf="@id/tvTrackTitle"
                        app:layout_constraintLeft_toLeftOf="parent"
                        app:layout_constraintRight_toRightOf="parent"
                        app:layout_constraintVertical_bias="0.4">

                        <!-- Outer Ring -->
                        <com.google.android.material.card.MaterialCardView
                            android:layout_width="match_parent"
                            android:layout_height="match_parent"
                            app:cardCornerRadius="110dp"
                            app:cardBackgroundColor="#0D0D0D"
                            app:strokeColor="#335EFF00"
                            app:strokeWidth="2dp"
                            app:cardElevation="0dp" />

                        <!-- Inner Circle 1 -->
                        <com.google.android.material.card.MaterialCardView
                            android:layout_width="180dp"
                            android:layout_height="180dp"
                            app:cardCornerRadius="90dp"
                            app:cardBackgroundColor="#090909"
                            app:strokeColor="#444444"
                            app:strokeWidth="1dp"
                            app:cardElevation="0dp"
                            app:layout_constraintTop_toTopOf="parent"
                            app:layout_constraintBottom_toBottomOf="parent"
                            app:layout_constraintLeft_toLeftOf="parent"
                            app:layout_constraintRight_toRightOf="parent" />

                        <!-- Inner Circle 2 -->
                        <com.google.android.material.card.MaterialCardView
                            android:layout_width="140dp"
                            android:layout_height="140dp"
                            app:cardCornerRadius="70dp"
                            app:cardBackgroundColor="#060606"
                            app:strokeColor="#333333"
                            app:strokeWidth="1dp"
                            app:cardElevation="0dp"
                            app:layout_constraintTop_toTopOf="parent"
                            app:layout_constraintBottom_toBottomOf="parent"
                            app:layout_constraintLeft_toLeftOf="parent"
                            app:layout_constraintRight_toRightOf="parent" />

                        <!-- Center Logo Label (Vinyl Center) -->
                        <com.google.android.material.card.MaterialCardView
                            android:layout_width="70dp"
                            android:layout_height="70dp"
                            app:cardCornerRadius="35dp"
                            app:cardBackgroundColor="#121212"
                            app:strokeColor="#5EFF00"
                            app:strokeWidth="1.5dp"
                            app:cardElevation="0dp"
                            app:layout_constraintTop_toTopOf="parent"
                            app:layout_constraintBottom_toBottomOf="parent"
                            app:layout_constraintLeft_toLeftOf="parent"
                            app:layout_constraintRight_toRightOf="parent" >

                            <ImageView
                                android:layout_width="match_parent"
                                android:layout_height="match_parent"
                                android:src="@drawable/ic_star_logo"
                                android:padding="16dp"
                                android:contentDescription="Star logo center" />
                        </com.google.android.material.card.MaterialCardView>

                    </androidx.constraintlayout.widget.ConstraintLayout>

                    <!-- Track metadata -->
                    <TextView
                        android:id="@+id/tvTrackTitle"
                        android:layout_width="0dp"
                        android:layout_height="wrap_content"
                        android:text="LIVE STREAM BROADCAST"
                        android:textColor="#FFFFFF"
                        android:textSize="18sp"
                        android:textStyle="bold"
                        android:gravity="center"
                        android:ellipsize="end"
                        android:maxLines="1"
                        app:layout_constraintBottom_toTopOf="@id/tvArtist"
                        app:layout_constraintLeft_toLeftOf="parent"
                        app:layout_constraintRight_toRightOf="parent"
                        android:layout_marginBottom="6dp" />

                    <TextView
                        android:id="@+id/tvArtist"
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:text="HERBDOUT RADIO"
                        android:textColor="#5EFF00"
                        android:textSize="12sp"
                        android:textStyle="bold"
                        android:letterSpacing="0.05"
                        app:layout_constraintBottom_toBottomOf="parent"
                        app:layout_constraintLeft_toLeftOf="parent"
                        app:layout_constraintRight_toRightOf="parent" />

                </androidx.constraintlayout.widget.ConstraintLayout>
            </com.google.android.material.card.MaterialCardView>

            <!-- Bottom Control Panel -->
            <com.google.android.material.card.MaterialCardView
                android:id="@+id/playerCard"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_marginLeft="24dp"
                android:layout_marginRight="24dp"
                android:layout_marginBottom="24dp"
                app:cardBackgroundColor="#0B0C0B"
                app:strokeColor="#1A5EFF00"
                app:strokeWidth="1dp"
                app:cardCornerRadius="24dp"
                app:layout_constraintBottom_toBottomOf="parent">

                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:orientation="vertical"
                    android:gravity="center"
                    android:padding="24dp">

                    <TextView
                        android:id="@+id/tvStatus"
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:text="TAP PLAY TO TUNE IN"
                        android:textColor="#888888"
                        android:textSize="12sp"
                        android:textStyle="bold"
                        android:gravity="center"
                        android:layout_marginBottom="20dp"
                        android:letterSpacing="0.05" />

                    <!-- Play/Pause Button -->
                    <com.google.android.material.button.MaterialButton
                        android:id="@+id/btnPlay"
                        android:layout_width="match_parent"
                        android:layout_height="56dp"
                        android:text="Listen"
                        android:textColor="#000000"
                        android:backgroundTint="#5EFF00"
                        android:textSize="16sp"
                        android:textStyle="bold"
                        app:cornerRadius="28dp"
                        android:elevation="4dp" />

                </LinearLayout>
            </com.google.android.material.card.MaterialCardView>

        </androidx.constraintlayout.widget.ConstraintLayout>
        EOF

    # Overwrites MainActivity.kt with dynamic black status-bar colors
    - name: Force Overwrite MainActivity.kt
      run: |
        mkdir -p app/src/main/java/com/example/audiostreamer
        cat << 'EOF' > app/src/main/java/com/example/audiostreamer/MainActivity.kt
        package com.example.audiostreamer

        import android.media.AudioAttributes
        import android.media.MediaPlayer
        import android.os.Bundle
        import android.view.View
        import android.view.animation.AlphaAnimation
        import android.view.animation.Animation
        import android.view.animation.LinearInterpolator
        import android.view.animation.RotateAnimation
        import android.widget.Button
        import android.widget.TextView
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {

            private var mediaPlayer: MediaPlayer? = null
            private var isStreamActive = false
            private val streamUrl = "http://uk18freenew.listen2myradio.com:5784/stream"

            private lateinit var btnPlay: Button
            private lateinit var tvStatus: TextView
            private lateinit var tvLiveStatus: TextView
            private lateinit var liveDot: View
            private lateinit var vinylRecord: View

            private var rotateAnim: RotateAnimation? = null

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                // Forces status bar at the very top of the screen to be black matching our OLED theme
                window.statusBarColor = android.graphics.Color.parseColor("#080808")
                window.navigationBarColor = android.graphics.Color.parseColor("#080808")

                setContentView(R.layout.activity_main)

                btnPlay = findViewById(R.id.btnPlay)
                tvStatus = findViewById(R.id.tvStatus)
                tvLiveStatus = findViewById(R.id.tvLiveStatus)
                liveDot = findViewById(R.id.liveDot)
                vinylRecord = findViewById(R.id.vinylRecord)

                btnPlay.setOnClickListener {
                    togglePlayback()
                }
            }

            private fun togglePlayback() {
                if (!isStreamActive) {
                    startPlaying()
                } else {
                    stopPlaying()
                }
            }

            private fun startPlaying() {
                tvStatus.text = "CONNECTING..."
                tvStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                tvLiveStatus.text = "CONNECTING"
                tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                btnPlay.isEnabled = false

                try {
                    mediaPlayer = MediaPlayer().apply {
                        setAudioAttributes(
                            AudioAttributes.Builder()
                                .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                                .setUsage(AudioAttributes.USAGE_MEDIA)
                                .build()
                        )
                        setDataSource(streamUrl)
                        setOnPreparedListener {
                            it.start()
                            isStreamActive = true
                            btnPlay.text = "Pause"
                            btnPlay.isEnabled = true
                            
                            tvStatus.text = "NOW PLAYING LIVE"
                            tvStatus.setTextColor(android.graphics.Color.parseColor("#5EFF00"))
                            
                            tvLiveStatus.text = "LIVE"
                            tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#5EFF00"))
                            
                            // Start pulsing live dot in header
                            liveDot.visibility = View.VISIBLE
                            val blink = AlphaAnimation(0.3f, 1.0f).apply {
                                duration = 800
                                repeatMode = Animation.REVERSE
                                repeatCount = Animation.INFINITE
                            }
                            liveDot.startAnimation(blink)

                            // Start spinning the vinyl record
                            startVinylRotation()
                        }
                        setOnErrorListener { _, _, _ ->
                            tvStatus.text = "Radio is not broadcasting right now.\nPlease try again later."
                            tvStatus.setTextColor(android.graphics.Color.parseColor("#EF4444")) // Red
                            
                            tvLiveStatus.text = "OFF AIR"
                            tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                            
                            resetPlayer()
                            true
                        }
                        prepareAsync()
                    }
                } catch (e: Exception) {
                    tvStatus.text = "Radio is not broadcasting right now.\nPlease try again later."
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                    resetPlayer()
                }
            }

            private fun stopPlaying() {
                resetPlayer()
                tvStatus.text = "TAP PLAY TO TUNE IN"
                tvStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                tvLiveStatus.text = "OFF AIR"
                tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
            }

            private fun resetPlayer() {
                mediaPlayer?.let {
                    if (it.isPlaying) {
                        it.stop()
                    }
                    it.release()
                }
                mediaPlayer = null
                isStreamActive = false
                btnPlay.text = "Listen"
                btnPlay.isEnabled = true
                
                // Stop live dot animation
                liveDot.clearAnimation()
                liveDot.visibility = View.GONE

                // Stop vinyl rotation
                stopVinylRotation()
            }

            private fun startVinylRotation() {
                if (rotateAnim == null) {
                    rotateAnim = RotateAnimation(
                        0f, 360f,
                        Animation.RELATIVE_TO_SELF, 0.5f,
                        Animation.RELATIVE_TO_SELF, 0.5f
                    ).apply {
                        duration = 5000 // 5 seconds per full rotation
                        repeatCount = Animation.INFINITE
                        interpolator = LinearInterpolator()
                    }
                }
                vinylRecord.startAnimation(rotateAnim)
            }

            private fun stopVinylRotation() {
                vinylRecord.clearAnimation()
            }

            override fun onDestroy() {
                super.onDestroy()
                resetPlayer()
            }
        }
        EOF

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
