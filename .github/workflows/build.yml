    # Creates the silent background worker that checks stream connectivity and launches push notifications
    - name: Create StreamCheckWorker.kt
      shell: python
      run: |
        import os
        os.makedirs("app/src/main/java/com/example/audiostreamer", exist_ok=True)
        with open("app/src/main/java/com/example/audiostreamer/StreamCheckWorker.kt", "w") as f:
            f.write("""package com.example.audiostreamer

        import android.app.NotificationChannel
        import android.app.NotificationManager
        import android.app.PendingIntent
        import android.content.Context
        import android.content.Intent
        import android.os.Build
        import androidx.core.app.NotificationCompat
        import androidx.core.app.NotificationManagerCompat
        import androidx.work.CoroutineWorker
        import androidx.work.WorkerParameters
        import java.net.HttpURLConnection
        import java.net.URL

        class StreamCheckWorker(appContext: Context, workerParams: WorkerParameters) :
            CoroutineWorker(appContext, workerParams) {

            private val streamUrl = "http://uk18freenew.listen2myradio.com:5784/stream"
            private val prefsFilename = "herbdout_prefs"
            private val keyWasOnline = "was_online"
            private val channelId = "herbdout_live_channel"

            override suspend fun doWork(): Result {
                val isOnline = checkStreamAvailability()
                val sharedPrefs = applicationContext.getSharedPreferences(prefsFilename, Context.MODE_PRIVATE)
                val wasOnline = sharedPrefs.getBoolean(keyWasOnline, false)

                // Trigger a notification only when transitioning from Offline to Live
                if (isOnline && !wasOnline) {
                    sendNotification()
                }

                // Cache the last checked status
                sharedPrefs.edit().putBoolean(keyWasOnline, isOnline).apply()

                return Result.success()
            }

            private fun checkStreamAvailability(): Boolean {
                var connection: HttpURLConnection? = null
                return try {
                    val url = URL(streamUrl)
                    connection = url.openConnection() as HttpURLConnection
                    connection.connectTimeout = 5000
                    connection.readTimeout = 5000
                    connection.requestMethod = "GET"
                    
                    val responseCode = connection.responseCode
                    responseCode in 200..399
                } catch (e: Exception) {
                    false
                } finally {
                    connection?.disconnect()
                }
            }

            private fun sendNotification() {
                createNotificationChannel()

                val intent = Intent(applicationContext, MainActivity::class.java).apply {
                    flags = Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_CLEAR_TASK
                }
                
                val pendingIntent = PendingIntent.getActivity(
                    applicationContext, 
                    0, 
                    intent, 
                    PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT
                )

                val notification = NotificationCompat.Builder(applicationContext, channelId)
                    .setSmallIcon(R.drawable.ic_star_logo)
                    .setContentTitle("Herbdout Radio is Live!")
                    .setContentText("The stream is now broadcasting. Tap to listen!")
                    .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                    .setContentIntent(pendingIntent)
                    .setAutoCancel(true)
                    .setColor(android.graphics.Color.parseColor("#5EFF00"))
                    .build()

                try {
                    NotificationManagerCompat.from(applicationContext).notify(1001, notification)
                } catch (e: SecurityException) {
                    // Ignored on device restriction settings
                }
            }

            private fun createNotificationChannel() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    val name = "Live Notifications"
                    val descriptionText = "Notifies you when Herbdout Radio starts broadcasting"
                    val importance = NotificationManager.IMPORTANCE_DEFAULT
                    val channel = NotificationChannel(channelId, name, importance).apply {
                        description = descriptionText
                    }
                    val notificationManager: NotificationManager =
                        applicationContext.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                    notificationManager.createNotificationChannel(channel)
                }
            }
        }""")
        # Overwrites MainActivity.kt with black status-bar, 20s connection timeout, permission requests, and WorkManager scheduler
    # Backslashes are escaped (\\n) so Python writes it to the Kotlin file correctly as \n
    - name: Force Overwrite MainActivity.kt
      shell: python
      run: |
        import os
        os.makedirs("app/src/main/java/com/example/audiostreamer", exist_ok=True)
        with open("app/src/main/java/com/example/audiostreamer/MainActivity.kt", "w") as f:
            f.write("""package com.example.audiostreamer

        import android.Manifest
        import android.content.pm.PackageManager
        import android.media.AudioAttributes
        import android.media.MediaPlayer
        import android.os.Build
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.view.View
        import android.view.animation.AlphaAnimation
        import android.view.animation.Animation
        import android.view.animation.LinearInterpolator
        import android.view.animation.RotateAnimation
        import android.widget.Button
        import android.widget.TextView
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.app.ActivityCompat
        import androidx.core.content.ContextCompat
        import androidx.work.ExistingPeriodicWorkPolicy
        import androidx.work.PeriodicWorkRequestBuilder
        import androidx.work.WorkManager
        import java.util.concurrent.TimeUnit

        class MainActivity : AppCompatActivity() {

            private var mediaPlayer: MediaPlayer? = null
            private var isStreamActive = false
            private val streamUrl = "http://uk18freenew.listen2myradio.com:5784/stream"

            private lateinit var btnPlay: Button
            private lateinit var tvStatus: TextView
            private lateinit var tvLiveStatus: TextView
            private lateinit var liveDot: View
            private lateinit var vinylRecord: View

            private var rotateAnim: RotateAnimation? = null

            // Handler and runnable for the 20-second connection timeout
            private val timeoutHandler = Handler(Looper.getMainLooper())
            private val timeoutRunnable = Runnable {
                if (!isStreamActive && mediaPlayer != null) {
                    tvStatus.text = "Radio is not broadcasting right now.\\nPlease try again later."
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                    
                    tvLiveStatus.text = "OFF AIR"
                    tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                    
                    resetPlayer()
                }
            }

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                // Forces status bar at the very top of the screen to be black matching our OLED theme
                window.statusBarColor = android.graphics.Color.parseColor("#080808")
                window.navigationBarColor = android.graphics.Color.parseColor("#080808")

                setContentView(R.layout.activity_main)

                btnPlay = findViewById(R.id.btnPlay)
                tvStatus = findViewById(R.id.tvStatus)
                tvLiveStatus = findViewById(R.id.tvLiveStatus)
                liveDot = findViewById(R.id.liveDot)
                vinylRecord = findViewById(R.id.vinylRecord)

                btnPlay.setOnClickListener {
                    togglePlayback()
                }

                // Check and request Android push notification permissions on launch (Android 13+)
                checkAndRequestPermissions()

                // Register silent 15-minute periodic live stream availability check
                setupBackgroundChecks()
            }

            private fun checkAndRequestPermissions() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS) 
                        != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(
                            this, 
                            arrayOf(Manifest.permission.POST_NOTIFICATIONS), 
                            101
                        )
                    }
                }
            }

            private fun setupBackgroundChecks() {
                val checkRequest = PeriodicWorkRequestBuilder<StreamCheckWorker>(
                    15, TimeUnit.MINUTES // Minimum interval Android allows to preserve battery
                ).build()

                WorkManager.getInstance(applicationContext).enqueueUniquePeriodicWork(
                    "HerbdoutStreamCheck",
                    ExistingPeriodicWorkPolicy.KEEP, // Keep existing if already scheduled
                    checkRequest
                )
            }

            private fun togglePlayback() {
                if (!isStreamActive) {
                    startPlaying()
                } else {
                    stopPlaying()
                }
            }

            private fun startPlaying() {
                tvStatus.text = "CONNECTING..."
                tvStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                tvLiveStatus.text = "CONNECTING"
                tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                btnPlay.isEnabled = false

                // Start the 20-second timeout timer
                timeoutHandler.postDelayed(timeoutRunnable, 20000)

                try {
                    mediaPlayer = MediaPlayer().apply {
                        setAudioAttributes(
                            AudioAttributes.Builder()
                                .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                                .setUsage(AudioAttributes.USAGE_MEDIA)
                                .build()
                        )
                        setDataSource(streamUrl)
                        setOnPreparedListener {
                            // Cancel the timeout timer since we successfully connected
                            timeoutHandler.removeCallbacks(timeoutRunnable)

                            it.start()
                            isStreamActive = true
                            btnPlay.text = "Pause"
                            btnPlay.isEnabled = true
                            
                            tvStatus.text = "NOW PLAYING LIVE"
                            tvStatus.setTextColor(android.graphics.Color.parseColor("#5EFF00"))
                            
                            tvLiveStatus.text = "LIVE"
                            tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#5EFF00"))
                            
                            // Start pulsing live dot in header
                            liveDot.visibility = View.VISIBLE
                            val blink = AlphaAnimation(0.3f, 1.0f).apply {
                                duration = 800
                                repeatMode = Animation.REVERSE
                                repeatCount = Animation.INFINITE
                            }
                            liveDot.startAnimation(blink)

                            // Start spinning the vinyl record
                            startVinylRotation()
                        }
                        setOnErrorListener { _, _, _ ->
                            timeoutHandler.removeCallbacks(timeoutRunnable)
                            tvStatus.text = "Radio is not broadcasting right now.\\nPlease try again later."
                            tvStatus.setTextColor(android.graphics.Color.parseColor("#EF4444")) // Red
                            
                            tvLiveStatus.text = "OFF AIR"
                            tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                            
                            resetPlayer()
                            true
                        }
                        prepareAsync()
                    }
                } catch (e: Exception) {
                    timeoutHandler.removeCallbacks(timeoutRunnable)
                    tvStatus.text = "Radio is not broadcasting right now.\\nPlease try again later."
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                    resetPlayer()
                }
            }

            private fun stopPlaying() {
                resetPlayer()
                tvStatus.text = "TAP PLAY TO TUNE IN"
                tvStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                tvLiveStatus.text = "OFF AIR"
                tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
            }

            private fun resetPlayer() {
                timeoutHandler.removeCallbacks(timeoutRunnable)
                mediaPlayer?.let {
                    if (it.isPlaying) {
                        it.stop()
                    }
                    it.release()
                }
                mediaPlayer = null
                isStreamActive = false
                btnPlay.text = "Listen"
                btnPlay.isEnabled = true
                
                // Stop live dot animation
                liveDot.clearAnimation()
                liveDot.visibility = View.GONE

                // Stop vinyl rotation
                stopVinylRotation()
            }

            private fun startVinylRotation() {
                if (rotateAnim == null) {
                    rotateAnim = RotateAnimation(
                        0f, 360f,
                        Animation.RELATIVE_TO_SELF, 0.5f,
                        Animation.RELATIVE_TO_SELF, 0.5f
                    ).apply {
                        duration = 5000 // 5 seconds per full rotation
                        repeatCount = Animation.INFINITE
                        interpolator = LinearInterpolator()
                    }
                }
                vinylRecord.startAnimation(rotateAnim)
            }

            private fun stopVinylRotation() {
                vinylRecord.clearAnimation()
            }

            override fun onDestroy() {
                super.onDestroy()
                resetPlayer()
            }
        }""")

    # Runs clean compilation before assemble to force the compiler to write physical files on every build run
    - name: Build with Gradle
      run: gradle clean assembleDebug --stacktrace

    # Scans the workspace directory layout to verify exactly where any compiled APK files reside
    - name: Locate APK Files
      run: |
        echo "Listing any generated APK files in the project path:"
        find . -name "*.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
