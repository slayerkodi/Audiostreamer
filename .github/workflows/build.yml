# Appends the second half of the UI layout controller and triggers compiling of .apk
    - name: Force Overwrite MainActivity.kt (Part 2 of 2)
      shell: python
      run: |
        with open("app/src/main/java/com/example/audiostreamer/MainActivity.kt", "a") as f:
            f.write("""
            private fun setupEmojiButtons() {
                findViewById<Button>(R.id.btnEmojiHeart).setOnClickListener { sendEmoji("❤️") }
                findViewById<Button>(R.id.btnEmojiFire).setOnClickListener { sendEmoji("🔥") }
                findViewById<Button>(R.id.btnEmojiCrown).setOnClickListener { sendEmoji("👑") }
                findViewById<Button>(R.id.btnEmojiHeadphones).setOnClickListener { sendEmoji("🎧") }
                findViewById<Button>(R.id.btnEmojiStar).setOnClickListener { sendEmoji("🌟") }
            }

            private fun sendEmoji(emoji: String) {
                val prefs = getSharedPreferences("HerbdoutPrefs", MODE_PRIVATE)
                val username = prefs.getString("username", "Listener") ?: "Listener"
                val avatar = ""

                // Instantly play the float animation locally for immediate, lag-free feedback
                showFloatingEmoji(emoji, username, avatar)
                
                // Emit package to backend server
                if (mSocket != null && mSocket!!.connected()) {
                    try {
                        val payload = JSONObject().apply {
                            put("emoji", emoji)
                            put("sender", username) // Send under "sender"
                            put("avatar", avatar)
                        }
                        mSocket?.emit("send-emoji", payload)
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                }
            }

            private fun showFloatingEmoji(emoji: String, username: String, avatar: String) {
                runOnUiThread {
                    // Create translucent OLED styled reaction badge containing the sender's username
                    val badgeView = TextView(this).apply {
                        text = "$username: $emoji"
                        setTextColor(android.graphics.Color.WHITE)
                        textSize = 14f
                        setTypeface(null, android.graphics.Typeface.BOLD)
                        setBackgroundResource(R.drawable.reaction_badge_bg)
                        setPadding(24, 12, 24, 12)
                        
                        layoutParams = FrameLayout.LayoutParams(
                            FrameLayout.LayoutParams.WRAP_CONTENT,
                            FrameLayout.LayoutParams.WRAP_CONTENT
                        ).apply {
                            gravity = android.view.Gravity.BOTTOM or android.view.Gravity.CENTER_HORIZONTAL
                        }
                    }

                    emojiContainer.addView(badgeView)

                    // Get screen width and height dynamically to animate perfectly on any screen size
                    val displayMetrics = resources.displayMetrics
                    val screenHeight = displayMetrics.heightPixels.toFloat()
                    val screenWidth = displayMetrics.widthPixels.toFloat()

                    // Randomize horizontal starting point across the middle 60% of the screen
                    val randomX = ((Math.random() * (screenWidth * 0.6)) - (screenWidth * 0.3)).toFloat()
                    badgeView.translationX = randomX

                    // Thread-isolated property animation moves vertically up and fades away
                    badgeView.animate()
                        .translationY(-screenHeight) // Float all the way to the top of the screen
                        .alpha(0f)
                        .scaleX(1.1f)
                        .scaleY(1.1f)
                        .setDuration(2500) // 2.5 seconds floating time
                        .setInterpolator(android.view.animation.AccelerateDecelerateInterpolator())
                        .withEndAction {
                            emojiContainer.removeView(badgeView) // Avoid memory leaks
                        }
                        .start()
                }
            }

            private fun toggleChatView(show: Boolean) {
                if (show) {
                    recordCard.visibility = View.GONE
                    chatPanel.visibility = View.VISIBLE
                    btnToggleChat.visibility = View.GONE
                    btnToggleSettings.visibility = View.GONE
                    chatScrollView.post {
                        chatScrollView.fullScroll(View.FOCUS_DOWN)
                    }
                } else {
                    chatPanel.visibility = View.GONE
                    recordCard.visibility = View.VISIBLE
                    btnToggleChat.visibility = View.VISIBLE
                    btnToggleSettings.visibility = View.VISIBLE
                }
            }

            private fun toggleSettingsView(show: Boolean) {
                if (show) {
                    recordCard.visibility = View.GONE
                    settingsPanel.visibility = View.VISIBLE
                    btnToggleChat.visibility = View.GONE
                    btnToggleSettings.visibility = View.GONE
                } else {
                    settingsPanel.visibility = View.GONE
                    recordCard.visibility = View.VISIBLE
                    btnToggleChat.visibility = View.VISIBLE
                    btnToggleSettings.visibility = View.VISIBLE
                }
            }

            private fun saveUsernamePreference() {
                val newName = etUsernameInput.text.toString().trim()
                if (newName.isNotEmpty()) {
                    val prefs = getSharedPreferences("HerbdoutPrefs", MODE_PRIVATE)
                    prefs.edit().putString("username", newName).apply()
                    toggleSettingsView(false)
                }
            }

            private fun sendChatMessage() {
                val text = etChatInput.text.toString().trim()
                if (text.isEmpty()) return

                val prefs = getSharedPreferences("HerbdoutPrefs", MODE_PRIVATE)
                val username = prefs.getString("username", "Listener") ?: "Listener"
                val avatar = ""

                if (mSocket != null && mSocket!!.connected()) {
                    try {
                        val payload = JSONObject().apply {
                            put("sender", username)
                            put("avatar", avatar)
                            put("text", text)
                        }
                        mSocket?.emit("send-chat", payload)
                        etChatInput.text.clear()
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                }
            }

            private fun addChatMessageToUI(msg: JSONObject) {
                val sender = msg.optString("sender", "Listener")
                val messageText = msg.optString("text", "")
                if (messageText.isEmpty()) return

                // Create custom styled vertical message bubble layout
                val bubbleLayout = android.widget.LinearLayout(this).apply {
                    orientation = android.widget.LinearLayout.VERTICAL
                    setBackgroundResource(R.drawable.reaction_badge_bg)
                    setPadding(24, 16, 24, 16)
                    
                    val params = android.widget.LinearLayout.LayoutParams(
                        android.widget.LinearLayout.LayoutParams.MATCH_PARENT,
                        android.widget.LinearLayout.LayoutParams.WRAP_CONTENT
                    ).apply {
                        setMargins(0, 0, 0, 16)
                    }
                    layoutParams = params
                }

                // Sender display username (Green)
                val tvSender = TextView(this).apply {
                    text = sender
                    setTextColor(android.graphics.Color.parseColor("#5EFF00"))
                    textSize = 12f
                    setTypeface(null, android.graphics.Typeface.BOLD)
                    layoutParams = android.widget.LinearLayout.LayoutParams(
                        android.widget.LinearLayout.LayoutParams.WRAP_CONTENT,
                        android.widget.LinearLayout.LayoutParams.WRAP_CONTENT
                    ).apply {
                        setMargins(0, 0, 0, 4)
                    }
                }

                // Message text content (White)
                val tvText = TextView(this).apply {
                    text = messageText
                    setTextColor(android.graphics.Color.WHITE)
                    textSize = 14f
                    layoutParams = android.widget.LinearLayout.LayoutParams(
                        android.widget.LinearLayout.LayoutParams.MATCH_PARENT,
                        android.widget.LinearLayout.LayoutParams.WRAP_CONTENT
                    )
                }

                bubbleLayout.addView(tvSender)
                bubbleLayout.addView(tvText)

                chatMessagesContainer.addView(bubbleLayout)

                // Limit displayed history count to preserve device memory performance
                if (chatMessagesContainer.childCount > 100) {
                    chatMessagesContainer.removeViewAt(0)
                }

                // Auto Scroll down
                chatScrollView.post {
                    chatScrollView.fullScroll(View.FOCUS_DOWN)
                }
            }

            private fun togglePlayback() {
                if (!AudioService.isStreamPlaying && !AudioService.isConnecting) {
                    startPlaybackService()
                } else {
                    stopPlaybackService()
                }
            }

            private fun startPlaybackService() {
                val intent = Intent(this, AudioService::class.java).apply {
                    action = AudioService.ACTION_PLAY
                }
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    startForegroundService(intent)
                } else {
                    startService(intent)
                }
            }

            private fun stopPlaybackService() {
                val intent = Intent(this, AudioService::class.java).apply {
                    action = AudioService.ACTION_STOP
                }
                startService(intent)
            }

            private fun updateUIState() {
                if (AudioService.isConnecting) {
                    tvStatus.text = "CONNECTING..."
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                    tvLiveStatus.text = "CONNECTING"
                    tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                    btnPlay.isEnabled = false
                    btnPlay.text = "Listen"
                    liveDot.clearAnimation()
                    liveDot.visibility = View.GONE
                    stopVinylRotation()
                } else if (AudioService.isStreamPlaying) {
                    btnPlay.text = "Pause"
                    btnPlay.isEnabled = true
                    
                    tvStatus.text = "NOW PLAYING LIVE"
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#5EFF00"))
                    
                    tvLiveStatus.text = "LIVE"
                    tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#5EFF00"))
                    
                    // Starts blinking live dot
                    liveDot.visibility = View.VISIBLE
                    val blink = AlphaAnimation(0.3f, 1.0f).apply {
                        duration = 800
                        repeatMode = Animation.REVERSE
                        repeatCount = Animation.INFINITE
                    }
                    liveDot.startAnimation(blink)

                    startVinylRotation()
                } else if (AudioService.isError) {
                    btnPlay.text = "Listen"
                    btnPlay.isEnabled = true
                    tvStatus.text = "Radio is not broadcasting right now.\\nPlease try again later."
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                    
                    tvLiveStatus.text = "OFF AIR"
                    tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#EF4444"))
                    
                    liveDot.clearAnimation()
                    liveDot.visibility = View.GONE
                    stopVinylRotation()
                } else {
                    btnPlay.text = "Listen"
                    btnPlay.isEnabled = true
                    tvStatus.text = "TAP PLAY TO TUNE IN"
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                    tvLiveStatus.text = "OFF AIR"
                    tvLiveStatus.setTextColor(android.graphics.Color.parseColor("#888888"))
                    
                    liveDot.clearAnimation()
                    liveDot.visibility = View.GONE
                    stopVinylRotation()
                }
            }

            private fun startVinylRotation() {
                if (rotateAnim == null) {
                    rotateAnim = RotateAnimation(
                        0f, 360f,
                        Animation.RELATIVE_TO_SELF, 0.5f,
                        Animation.RELATIVE_TO_SELF, 0.5f
                    ).apply {
                        duration = 5000 // 5 seconds per full rotation
                        repeatCount = Animation.INFINITE
                        interpolator = LinearInterpolator()
                    }
                }
                vinylRecord.startAnimation(rotateAnim)
            }

            private fun stopVinylRotation() {
                vinylRecord.clearAnimation()
            }

            override fun onResume() {
                super.onResume()
                updateUIState()
            }

            override fun onDestroy() {
                super.onDestroy()
                AudioService.listener = null
                mSocket?.disconnect()
                mSocket?.off("new-emoji")
            }
        }""")

    # Runs clean compilation before assemble to force the compiler to write physical files on every build run
    - name: Build with Gradle
      run: gradle clean assembleDebug --stacktrace

    # Scans the workspace directory layout to verify exactly where any compiled APK files reside
    - name: Locate APK Files
      run: |
        echo "Listing any generated APK files in the project path:"
        find . -name "*.apk"

    # Uploads the final installable native .apk file to your Actions tab
    - name: Upload Native APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
